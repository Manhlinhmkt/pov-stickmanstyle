# Character Asset Index
# Approved visual references for REAL_PERSON characters
# Reusable across episodes — check here before search_web or generate_image
#
# Naming convention:
#   CHAR_{FULL_NAME}: (e.g. CHAR_DONALD_TRUMP)
#   asset_file: "CHAR_{FULL_NAME}.png" or "CHAR_{FULL_NAME}_EVO.png" for evolution sheets
#
# Structure per character:
#   CHAR_ID:
#     real_person: "actual name"
#     visual_anchors: {hair, face, clothing, accessories, build}
#     asset_file: "filename.png"
#     approved_in: EP_ID (first episode where approved)
#     approved_date: YYYY-MM-DD
#     reused_in: [list of episodes that reused this asset]
#
# Usage:
#   1. /pvle-gen-episode-brief Step 3b-VERIFY checks this file FIRST
#   2. /pvle-character-review Step 2 checks for existing asset images
#   3. After user approval, Step 8 saves new entries here

characters:

  # ===== TRUMP FAMILY =====

  CHAR_DONALD_TRUMP:
    real_person: "Donald Trump"
    visual_anchors:
      hair: "Dark brown wisp neat combed (child/teen). Dark brown styling upward and back with volume forming (CONFLICT age 18-44). Transitioning swept-back lightening to blonde-orange (CRISIS age 44-58). FULL ICONIC swooped thick blonde-orange volume swept from right side (RESOLUTION age 58+ onward). Platinum fading in elder years."
      face: "Round white circle head. Tiny squinting dot eyes. Small tight pursed mouth. Orange/bronzed tint on circle head in later phases."
      clothing: "Blazer/military jacket (EARLY). Dark navy oversized boxy power suit with exaggerated broad structured shoulders, white shirt with French cuffs (CONFLICT+). LONG RED TIE appears CRISIS phase — extends well past belt line, grows longer each subsequent phase to EXTRA-LONG past mid-thigh (PRESENT)."
      accessories: "Red tie is THE constant across all adult phases from CRISIS onward. Gold watch, gold cufflinks. American flag lapel pin (presidential era). Gold letter shapes on buildings."
      build: "Child/teen slightly taller than peers athletic. Tall adult full frame expansive posture (CONFLICT). Heavier frame (CRISIS). Wide-shouldered (RESOLUTION). Commanding heavy-framed, chest-out confident stance (PRESENT). Slightly stooped in elder years."
    reference_file: "REF_DONALD_TRUMP.png"
    asset_file: "CHAR_DONALD_TRUMP.png"
    evolution_file: "CHAR_DONALD_TRUMP_EVO.png"
    approved_in: PV_0009
    approved_date: 2026-04-06
    reused_in: [PV_0001, PV_0002]

