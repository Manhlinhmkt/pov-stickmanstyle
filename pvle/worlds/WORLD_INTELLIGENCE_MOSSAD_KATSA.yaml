key_facts:
  - "Mossad recruits primarily from elite IDF units - candidates undergo multi-stage psychological screening, simulations under assumed identities, and stress tests lasting months before acceptance"
  - "Training at the Midrasha academy near Herzliya lasts up to two years - covering surveillance detection, agent recruitment, cover identity management, and operating in hostile environments"
  - "A katsa (case officer) is the Mossad's core field operative - responsible for finding, recruiting, and running human sources (agents) in foreign countries under deep cover identities"
  - "The Mossad relies on a global network of sayanim - Jewish diaspora volunteers who provide logistical support (vehicles, safe houses, medical care) to operatives without being on payroll"
  - "Operatives live under cover identities for years abroad - often as businessmen, students, or travelers - managing a psychological split between their real and operational personas that former agents describe as partial schizophrenia"
  - "Families of agents live in a house of silence - spouses often know only that their partner works for a vague government entity, children grow up confused by unexplained absences and strict security rules"
  - "HUMINT work requires systematic manipulation and deception of recruited sources - building genuine trust with people you intend to use, crossing moral boundaries that are unacceptable in civilian life"
  - "Former agents report extreme difficulty reintegrating into civilian life - the psychological effects of years of deception, the feeling of neglect by the state after service, and the lifelong obligation to keep secrets"

