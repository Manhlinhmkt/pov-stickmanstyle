creative_direction: |
  DO NOT tell: "he wants power back"
  DO tell: "he doesn't know who he is without that country"
  
  The core experience is IDENTITY VOID — a man whose entire existence is defined 
  by a place he cannot go, a title he cannot use, and a country that is being 
  destroyed while he watches from a sofa in another continent.
  
  The war section (2026) should feel like the cruelest test: 
  everything he wanted (regime fall) is happening, 
  but through bombs he didn't drop, in a country he can't enter, 
  to people he claims to represent but has never met.

