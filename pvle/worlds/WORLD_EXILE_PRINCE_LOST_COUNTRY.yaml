unique_circumstance_stack:
  - "Born crown prince of a 2,500-year monarchy — lost it all at 17"
  - "Left country for pilot training 1 year before revolution — the timing was accidental"
  - "Never set foot in homeland again after 1978 — 48 years and counting"
  - "Father refused surgery, hid cancer from family — died 18 months after losing power"
  - "Two siblings died in exile — overdose and suicide — the exile killed them slowly"
  - "Lives in a Maryland suburb — watches homeland crises on cable news from a living room"
  - "Name chanted by millions of protesters who have never met him and never will"
  - "Supported foreign military strikes on own country — called it humanitarian intervention"
  - "Asked foreign generals to destroy the government but spare the infrastructure"
  - "Has three daughters — named them heirs, breaking the dynasty's male succession"
  - "Claims he doesn't want the throne — but never renounced the title"
  - "Every interview: asked 'Do you want to be king?' — has answered it 10,000 times"

public_perception_markers:
  - "Hero to monarchists, traitor to revolutionaries, naive to intellectuals"
  - "The permanent exile who represents hope and betrayal simultaneously"
  - "Defined not by what he did but by what was taken from him before he could do anything"

key_tensions:
  - "Identity without homeland: who are you when the country that made you no longer exists?"
  - "Liberation vs destruction: calling bombs onto your own soil to free your people"
  - "Heir vs democrat: claiming democratic values while carrying a dynastic title"
  - "Distance vs relevance: 48 years of watching from 10,000 km away"

key_facts:
  - "Crown prince at age 7 — exiled at 17 — declared successor at 20"
  - "Trained as fighter pilot — never flew a combat mission"
  - "Father's cancer hidden from public — died in a borrowed palace in exile"
  - "Sister's hotel room death — family found out from news broadcasters"
  - "Brother's suicide ended the male line of the dynasty"
  - "Sold family home in Maryland suburb — listed at $8 million"
  - "Speaks to diaspora audiences — they cry when he speaks their language"
  - "During 2026 war: urged citizens to stay home, wait for his 'final call'"

key_locations:
  - "Imperial palace — childhood of ceremony and isolation"
