    - id: "HOOK_CURIOSITY"
      rank: 3
      lines:
        - "You don't know their name."
        - "You don't know where they're going."
        - "You just know you have six hours."
      note: "Mystery-driven. Works for cold audience who hasn't seen series."

# ============================================================
# CREATIVE CONSTRAINTS
# ============================================================
creative_constraints:
  primary_rule: "THE_ROAD_IS_THE_STORY"
  description: >
    The narrative lives inside the car - the sealed capsule where you and
    your cargo exist for six hours. The dashboard, the mirror, the backseat.
    All horror is experienced through the windshield, the rearview, and
    the silence between driver and passenger. You never see the surgery.
    You never meet the buyer. You never open the cooler. The entire episode
    is about what happens in the space between two coordinates - and what
    happens to a person who learns to treat that space as routine.
  subject_framing: >
    Subject is the most replaceable part of the chain - and knows it. Not
    powerful enough to negotiate, not skilled enough to be essential, not
    brave enough to refuse. The transporter is chosen for exactly one
    quality: the ability to not-know. The transition from discomfort to
    numbness to preference is the arc. The coldest moment is when you
    realize the cooler is easier than the person - and you start hoping
    every trip is a return trip.
  ending_logic: >
    The ending does not land on guilt or revelation. It lands on routine.
    The phone buzzes. New coordinates. You start the engine. You check
    the mirror. The backseat is empty. You drive. The horror is that
    nothing about this feels wrong anymore. It just feels like Tuesday.
  forbidden_framing:
    - "Action thriller or car chase sequences"
    - "Cool getaway driver fantasy"
    - "Graphic surgical descriptions"
    - "Subject as mastermind or key player"
    - "Redemption arc or whistleblower ending"
    - "Dramatic confrontation with law enforcement"
  required_framing:
    - "The car interior as the entire world of the narrative"
    - "Rearview mirror as the primary observation device with meaning progression"
    - "Silence as evolving texture - not static, but degrading from human to mechanical"
    - "The duality of person-trip vs cooler-trip as central motif"
    - "Daughter anchor as emotional distance measurement"
    - "Willful ignorance shown as progressive, not sudden"
    - "Time pressure (cold ischemia clock) as physical tension driver"
    - "Mid-video events as retention spikes (not just routine descriptions)"
    - "Two primary checkpoints: first time you don't ask + first time cooler doesn't bother"
    - "Routine as the final horror - the phone buzzes, you drive. Tuesday."

# ============================================================
# MICRO-BEHAVIORS (POV texture layer - weaponized as motifs)
# ============================================================
micro_behaviors:
  description: >
    Not just texture. These are recurring motifs that carry different
    meaning at different points in the narrative. The same action,
    repeated, tells the story of moral erosion without exposition.
  primary_motif:
    name: "THE_MIRROR_CHECK"
    technique: "MICRO_LOOP"
    technique_note: >
      Same line repeated 3 times across the episode. Same words,
      different meaning each time. Viewer recognizes the repetition
      and feels the shift without being told. High retention technique
      for long-form video - creates pattern recognition that keeps
      viewers watching for the next iteration.
    loop_line: "You check the rearview."
    progression:
      - point: "EARLY (ACT 1)"
        full_line: "You check the rearview. You see their face. You almost speak."
        meaning: "curiosity - the person is still a person"
      - point: "MID (ACT 2)"
        full_line: "You check the rearview. You adjust it away. You see only road."
        meaning: "avoidance - the person is becoming a problem"
      - point: "LATE (ACT 3)"
        full_line: "You check the rearview. You are checking if the cooler shifted."
        meaning: "logistics - the person is gone, only cargo remains"
      - point: "FINAL (last image)"
        full_line: "You do not adjust the mirror anymore."
        meaning: "extinction - the device itself is no longer needed"
  supporting_behaviors:
    - "You set the AC to exactly 18 degrees. The phone told you once. You never changed it."
    - "You drive exactly 5 km/h under the speed limit. Never over. Never exactly on."
    - "You put a towel on the seat before placing the cooler. Not to protect the seat. To stop the sliding."
    - "You count potholes on the route. You know which ones make the cooler shift."
    - "You turn the radio on when they cry. Not loud. Just loud enough."
    - "You grip the steering wheel at 10 and 2. Always. Even when parked."

# ============================================================
# FAILURE MECHANICS (psychological realism)
# ============================================================
failure_mechanics:
  description: >
    The transporter's failures are not moral crises. They are logistics
    errors - arriving late, taking a wrong turn, being stopped. The
    system punishes operational failure, not moral failure. You learn
    quickly: the only sin is being slow.
  pattern:
    - "You arrive late once. The phone call is short. You are not called for two weeks."
    - "You take the highway instead of the back road. A toll camera captures your plate. The car is burned."
    - "The cooler shifts and you hear something inside move. You grip the wheel tighter. You do not stop."
    - "A donor panics mid-drive. They want out. You slow down. You do not stop. The phone told you: do not stop."
    - "You are five minutes early. You wait in the parking lot. The engine running. The AC at 18."

