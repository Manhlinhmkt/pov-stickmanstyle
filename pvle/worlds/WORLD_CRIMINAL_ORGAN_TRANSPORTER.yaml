        - "Now you turn the radio up when they cry."
      note: "SELECTED. Implies full arc in 2 lines. High curiosity + discomfort. Creates question: what happened in between?"
    - id: "HOOK_COLDEST"
      rank: 2
      lines:
        - "On the way there, you carry a person."
        - "On the way back, you carry a cooler."
        - "After a while, they feel the same."
