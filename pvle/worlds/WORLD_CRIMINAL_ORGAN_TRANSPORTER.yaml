      sensory_detail:
        sound: "A dull, wet shift of weight inside sealed plastic"
        action: "You reach back without looking. You adjust the towel. You straighten the wheel."
        absence: "No flinch. No pause. No thought. You keep driving."
  supporting:
    - "The first time you notice the backseat smells different after a person vs after a cooler - and you prefer the cooler"
