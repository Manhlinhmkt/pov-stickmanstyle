    - "The first time you hope the backseat has a cooler instead of a person"

# ============================================================
# WILLFUL IGNORANCE (unique to this world)
# ============================================================
willful_ignorance:
  description: >
    The transporter's survival mechanism is not rationalization (like the
    broker) or language corruption (like the recruiter). It is the
    systematic construction of not-knowing. You do not ask because asking
    makes you responsible. You do not look because looking makes you a
    witness. You do not remember because remembering makes you guilty.
    The horror is not what you know. The horror is the precision with
    which you have engineered your own blindness - and the moment you
    realize the blindness is no longer an act. You genuinely do not care.
  identity_erosion_outside_car:
    description: >
      The numbness does not stay inside the car. It bleeds into the
      spaces that used to be yours. You used to be a person who talked
      to strangers. Who asked where they were going. Who remembered
      names. The car changed that - but you do not notice because the
      change happened on the road, and you left it there. Until you
      realize: you do not talk to anyone anymore. Not just passengers.
    contrast_markers:
      - before: "You used to talk to passengers. When you drove a taxi, you asked where they were going. You liked the conversation."
        after: "Now you eat alone. You do not call people back. Silence is not a rule anymore. It is who you are."
      - before: "You used to remember regulars by name. The woman on Tuesdays. The old man with the cane."
        after: "Now you remember routes by pothole. The curve where the cooler slides. The gas station with no camera."
  stages:
    - stage: "CURIOSITY"
      marker: "You wonder what is happening. You almost ask. You do not."
      mirror: "You look at them in the rearview. You see a face."
    - stage: "DISCIPLINE"
      marker: "You train yourself not to look. Not to ask. Not to remember faces."
      mirror: "You tilt the mirror to see only the road behind you."
    - stage: "HABIT"
      marker: "You stop noticing the person. They are a pickup time and a drop-off coordinate."
      mirror: "You forget to adjust the mirror. It does not matter."
    - stage: "EFFICIENCY"
      marker: "You optimize routes, timing, AC temperature. The cargo is a logistics variable."
      mirror: "You check the mirror to see if the cooler shifted. Not the person."
    - stage: "PREFERENCE"
      marker: "You prefer the return trip. The cooler does not talk. Does not cry. Does not thank you."
      mirror: "You hope the mirror shows a cooler. People are harder."
    - stage: "NUMBNESS"
      marker: "Someone asks what you do. You say: I drive. And it is true. That is all you do."
      mirror: "You do not adjust the mirror anymore. There is nothing back there you need to see."

# ============================================================
# SOUND DESIGN (production reference layer)
# ============================================================
sound_design:
  description: >
    Sound evolves with the narrative arc. Silence is not static - it
    progresses. Early drives are filled with human noise. Late drives
    are mechanical. The absence of human sound IS the character arc
    made audible.
  progression:
    - phase: "ACT_1"
      label: "Human Noise"
      layers:
        - "Engine idle, low and uneven"
        - "Road noise - gravel, then asphalt"
        - "Breathing from the backseat"
        - "Seat fabric shifting - the passenger is nervous"
        - "Your own swallow before you almost ask"
    - phase: "ACT_2"
      label: "Mechanical Transition"
      layers:
        - "Phone buzz - short, urgent"
        - "Radio turned up - just loud enough to cover crying"
        - "Turn signal clicking at the gas station"
        - "Cooler plastic scraping against seat leather"
        - "Envelope paper - counting bills"
    - phase: "ACT_3"
      label: "Machine Silence"
      layers:
        - "AC hum only - 18 degrees, constant"
        - "Turn signal - the only remaining human-initiated sound"
        - "Engine at cruising RPM - perfectly steady"
        - "No breathing. No shifting. No music."
        - "The phone buzzes. You start the engine. That is all."

# ============================================================
# HOOK OPTIONS (ranked for YouTube retention)
# ============================================================
hook_options:
  selected: "HOOK_DISTURBING"
  selection_rationale: >
    Progression in 2 lines. Creates immediate question: what happened
