# ============================================================
# CORE MECHANIC (narrative engine for this world)
# ============================================================
core_mechanic:
  name: "THE_QUIET_CARGO"
  description: >
    The transporter never touches the organ. Never enters the operating
    room. Never meets the buyer. You drive. You pick up a person at
    Point A and deliver them to Point B. Sometimes you drive back with
    one fewer passenger and one more cooler. The horror is not in what
    you carry. The horror is in what you choose not to ask. You learned
    early: the less you know, the more useful you are. Ignorance is not
    a weakness in this chain. It is your job description.
  operational_pattern:
    structure: "pickup -> transit -> delivery -> return (sometimes with cooler)"
    signature_behaviors:
      - "You check the rearview mirror. They are quiet. That is how it should be."
      - "You never ask their name. They never ask yours."
      - "You adjust the AC exactly the same way every time."
      - "You count the hours. Not because you care. Because the phone told you to."
    silent_rules:
      - "Never open the cooler."
      - "Never take a route you cannot explain to a traffic stop."
      - "Never remember faces."
      - "If they cry, turn the radio up."
  cargo_duality:
    description: >
      On the way there, you carry a person. They sit in the back seat.
      They breathe, fidget, sometimes talk. On the way back, you carry
      a cooler. It sits in the same seat. It does not breathe. The weight
      is different. The silence is the same. Over time, both trips feel
      identical. That is the moment you should worry. But you do not worry
      anymore.
    inbound: "Living person in backseat - nervous, quiet, sometimes crying"
    outbound: "Cooler on backseat - cold, silent, balanced on a towel"
    convergence: "The moment both feel the same weight to you"

# ============================================================
# PERSONAL ANCHOR (emotional through-line)
# ============================================================
personal_anchor:
  name: "THE_DAUGHTER"
  description: >
    Never named. Never described. She exists only through time
    references and comparison points. She is the unit of measurement
    for how far you have drifted. You do not lose her. You lose the
    ability to think about her during the drive. That is worse.
  anchor_progression:
    - stage: "PRESENT"
      moment: "You kiss her forehead before leaving. You tell her you will be back by morning."
    - stage: "COMPARISON"
      moment: "The person in the backseat is younger than her. You notice. You keep driving."
    - stage: "INTERFERENCE"
      moment: "You catch yourself calculating her age against the passenger's. You stop."
    - stage: "SEPARATION"
      moment: "You do not think about her during the drive anymore. You think about her when you get home."
    - stage: "ERASURE"
      moment: "You get home. She is asleep. You do not check on her. You check the phone."
  storytelling_device:
    name: "THE_REARVIEW_MIRROR"
    description: >
      The mirror is how you observe your cargo without turning around.
      Same gesture, same angle, same glass - but the meaning changes
      as you change. The mirror progression IS the moral arc.
    progression:
      - phase: "EARLY"
        behavior: "You look at them. You see a person. You almost speak."
      - phase: "MID"
        behavior: "You avoid looking. You adjust the mirror to see only the road."
      - phase: "LATE"
        behavior: "You look again. But only to check if the cooler shifted."

# ============================================================
# NARRATIVE ARC (suggested video structure)
# ============================================================
narrative_arc:
  description: >
    Three-act structure mapped to retention. Each act has clear
    escalation events - not just behavioral shifts. The mid-section
    survives on EVENTS, not just routine descriptions. ACT 2 uses a
    SINGLE RECURRING PERSON threaded across multiple events - not a
    montage of strangers. Same face, escalating stakes, cumulative impact.
  acts:
    - act: "ACT_1_NORMALIZATION"
      label: "The First Drive"
      video_position: "0:00 - 4:00 (hook + entry)"
      function: "Establish POV, rules, first pickup. Person is still a PERSON."
      key_moments:
        - "You kiss your daughter before leaving. You tell her: morning."
        - "The phone buzzes. Coordinates. A time. A number: 6."
        - "You pick someone up. They have no bag. They sit in the back."
        - "You check the rearview. You see their face. You almost speak."
        - "You almost ask where they are going. You do not."
      tension: "The impulse to ask vs the instruction not to"
      checkpoint: "FIRST TIME YOU DON'T ASK"
      emotional_state: "discomfort, curiosity, controlled fear"
      contrast_anchor: "You used to talk to passengers. When you drove a taxi, you asked where they were going. Now silence is the first rule."

    - act: "ACT_2_SYSTEM"
      label: "The Machine Runs"
      video_position: "4:00 - 11:00 (mid-video - retention danger zone)"
      function: "Escalate through EVENTS threaded around ONE recurring person. Not a montage - a connected descent."
      act2_thread:
        description: >
          One person appears across multiple events in ACT 2. Not the same
          literal trip - but the same face returning in different contexts.
          This transforms a montage into a connected story with 3x impact.
        thread_beats:
          - beat: "FIRST CONTACT"
            moment: "They ask: where are you taking me? You say nothing. They stop asking."
          - beat: "RECOGNITION"
            moment: "They are younger than your daughter. You adjust the mirror away."
          - beat: "CONSEQUENCE"
            moment: "You see their face on a missing persons post. You scroll past. You recognize the road."
      key_moments:
        - "They ask: where are you taking me? You say nothing. They stop asking."
        - "You check the rearview. They are younger than your daughter. You adjust the mirror away."
        - "Traffic stop. You smile. You say: my cousin is visiting a doctor. The officer waves you through."
        - "The phone buzzes during transit: faster. The donor is prepped. The clock is real."
        - "The broker offers a double run. Same night. You say yes before he finishes the sentence."
        - "You carry the cooler for the first time. Something shifts inside. You adjust the towel. You keep driving. It does not bother you."
        - "You recognize the road. You know the exact pothole where the cooler slides."
        - "Their face appears on a missing persons post. You scroll past."
      tension: "Events force escalation - each run removes one more layer of resistance"
      checkpoint: "FIRST TIME THE COOLER DOESN'T BOTHER YOU"
      checkpoint_detail: >
        Not just an internal shift. A sensory moment: something shifts
        inside the cooler. You hear it. You adjust the towel. You keep
        driving. The reaction that should have happened - does not. That
        absence IS the checkpoint.
      emotional_state: "numbness replacing discomfort, efficiency replacing caution"
      retention_spikes:
        - type: "SPIKE_EVENT"
          trigger: "Donor younger than daughter (same person as thread)"
          note: "Emotional gut-punch - forces viewer to feel the comparison"
        - type: "SPIKE_EVENT"
          trigger: "Traffic stop scene"
          note: "Tension spike - will he get caught? Classic retention mechanic"
        - type: "SPIKE_EVENT"
          trigger: "Missing persons post (same person as thread)"
          note: "Consequence made visible - the abstract becomes a face you recognize"
        - type: "SPIKE_EVENT"
          trigger: "Cooler shifts - sensory checkpoint moment"
          note: "The absence of reaction is the spike. Viewer feels it before the character does not."

    - act: "ACT_3_ROUTINE"
      label: "Tuesday"
      video_position: "11:00 - 15:00 (descent + ending)"
      function: "Collapse into routine. The horror is that nothing feels wrong."
      key_moments:
        - "You train a new driver. You show him the route. You sound exactly like the man who showed you."
        - "You check the mirror. You hope it is a cooler. People are harder."
        - "You get home. Your daughter is asleep. You do not check on her. You check the phone."
        - "The phone buzzes. New coordinates. You start the engine. Tuesday."
      last_image:
        description: >
          The mirror - the narrative spine of the entire episode - becomes
          unnecessary. The final frame is not action. It is absence.
        moment: "You do not adjust the mirror anymore. There is nothing back there you need to see."
        note: "Mirror callback. The device that carried the entire arc now dies. That death IS the ending."
      tension: "Total absence of tension IS the tension - you feel nothing"
      checkpoint: "THE MOMENT YOU HOPE FOR THE COOLER"
      emotional_state: "complete numbness, routine as identity, preference for cargo over person"

# ============================================================
# KEY FACTS (behavior-first, POV-ready)
# ============================================================
key_facts:
  # --- Observable behavior (VO-ready) ---
  - "You drive a rented sedan - never the same car twice, never your own"
  - "You receive coordinates by text message: a pickup time, a drop-off location, and a number that tells you how many hours you have"
  - "The person in the backseat has been told to trust you. They do not know your name. You do not know theirs."
  - "You stop only at pre-approved locations - specific gas stations where no cameras face the pumps"
  - "Cold ischemia time for a kidney is 24 hours maximum - you have been told you have 6 to deliver the cooler"
  - "You carry two phones: one for the broker, one for directions. Neither has your real number."
  - "You were a regular driver before - delivery, taxi, long-haul. Someone noticed you were reliable and quiet."
  - "You earn between $1,000 and $3,000 per trip depending on distance - more than a month of legitimate driving"
  - "If you are stopped, the person in the backseat is your cousin visiting a doctor. The cooler contains food. That is the story."
  - "You have never been inside the clinic. You stop at the gate. Someone comes out. The passenger gets out. You leave."

  # --- System context (writer reference) ---
  - "Organ trafficking networks prefer local drivers who know back roads and can avoid checkpoints over professional smugglers"
  - "Most transporters in trafficking networks are recruited from existing informal transport labor - motorized rickshaw drivers, bus operators, or unlicensed taxi drivers"
  - "The 24-hour cold ischemia window for kidneys creates the time pressure that defines every transport - the driver is racing a biological clock they barely understand"
  - "Transporters are deliberately kept ignorant of the full network - they know only the pickup contact and the drop-off contact, never the broker, surgeon, or buyer"
  - "In prosecution cases, transporters are often the weakest link - lowest paid, most exposed to law enforcement, and the first to be identified because they operate on public roads"

