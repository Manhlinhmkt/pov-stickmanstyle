  - WORLD_CRIMINAL_CORRUPT_COP_SHOOTER
series_note: >
  Third episode in the corrupt cop series. PV_0025 explored
  evidence fabrication (THE_MANUFACTURED_CASE) - signature:
  'You don't find evidence. You place it.' PV_0026 explored
  lethal force as addiction (THE_CALCULATED_SHOT) - signature:
  'I feared for my life.' PV_0027 explores human ownership
  through the CI system (THE_INFORMANT_MACHINE) - signature:
  'You own them.' Connecting thread: all three cops operate
  inside a system that never asks. Each signature phrase creates
  a reality the system accepts without verification. The
  difference: PV_0025 fabricates evidence. PV_0026 fabricates
  self-defense. PV_0027 fabricates cooperation.

