# ============================================================
# SNAP MOMENT (foreshadowed + sensory + aftermath)
# ============================================================
snap_moment:
  description: >
    The single moment that shifts from system horror to personal
    horror. The CI anchor - the one who calls at 2AM, the one
    the viewer has tracked across the episode - is sent into a
    buy the cop knows is dangerous. The cop does not warn them.
    The CI does not come back. The cop's first instinct is not
    grief. It is evidence destruction.
  foreshadow:
    - "They call you at 2AM the night before. You don't answer."
    - "You know the target carries. You send them anyway."
    - "You don't check the wire. You didn't give them one."
  setup: >
    You send them somewhere new.
    You know the target carries.
    You do not tell them.
  event: >
    The phone rings.
    Not the department phone.
    The other one.
  sensory_beat: >
    You wait for breathing.
    There is none.
  aftermath:
    immediate:
      - "You delete the thread."
      - "You remove the number."
      - "You close the file."
    cold_calculation: "You still have thirteen."
    erasure: "They were never yours."
  placement: "Late Phase 3 or early Phase 4 - after CI anchor is established and viewer is attached."
  effect: >
    Three-layer horror: (1) the viewer knew - the foreshadowing
    told them what the cop refused to say, (2) the sensory beat -
    waiting for breathing that does not come - makes it physical,
    (3) the cold calculation - 'You still have thirteen' - reveals
    the cop's grief response is inventory adjustment. The CI was
    always disposable. The viewer just didn't want to believe it.

# ============================================================
# IDENTITY EROSION (ownership arc)
# ============================================================
identity_erosion:
  description: >
    The cop does not become a puppet master in one moment. The
    badge stops meaning law enforcement and starts meaning human
    resource management. The most dangerous stage is when the cop
    stops seeing CIs as people and starts seeing them as inventory -
    units of leverage that produce cases on demand.
  stages:
    - stage: "IDEALIST"
      marker: "You want to take drugs off the street. The CI program is a tool. You believe the deal."
    - stage: "FIRST_FLIP"
      marker: "You flip someone for the first time. They cry. You feel the weight of what you offered."
    - stage: "EFFICIENCY"
      marker: "You stop caring if the charge is serious. A bag of weed is enough. Leverage is leverage."
    - stage: "INVENTORY"
      marker: "You have a list. Names, charges, phone numbers. You manage them like accounts. Output per week."
    - stage: "OWNERSHIP"
      marker: "They try to quit. You remind them the original charge still exists. They don't quit. They can't."
    - stage: "ERASURE"
      marker: "One does not come back. You delete the number. You remove the name. You still have thirteen."

# ============================================================
# CONTAGIOUS OWNERSHIP (the method spreads)
# ============================================================
contagious_ownership:
  description: >
    The cop's method does not stay contained. A new detective
    rides along. Watches how you flip someone. Watches how you
    manage the phone. This is not mentorship. This is transmission.
    The system does not need to teach exploitation. It just needs
    to pair the new detective with you.
  progression:
    - stage: "OBSERVATION"
      beat: "The new detective watches you flip someone in the booking room. Says nothing. Takes notes."
    - stage: "IMITATION"
      beat: "The new detective tries the pitch. Too soft. Too honest. You correct them: 'Don't ask. Tell.'"
    - stage: "ADOPTION"
      beat: "The new detective flips their first CI alone. Uses your words. Your phrasing. Your phone."
    - stage: "REPLICATION"
      beat: "The new detective has their own second phone now. Their own list. Their own version of 'work this off.' The cycle is complete."

# ============================================================
# ENDING LOGIC (inventory as identity)
# ============================================================
ending_logic:
  description: >
    The ending is not about regret. It is about reduction. The cop
    does not lose humanity in a dramatic moment. The cop reduces
    humanity to data points. Names become numbers. People become
    output. The final image is not looking back. It is looking
    forward - same chair, same charge, same offer - because the
    machine does not stop. It does not need to. No one is watching.
  ending_beats:
    - "You look at the phone. Thirteen numbers. Each one is a person who cannot say no."
    - "You don't remember the first one's face. You remember their charge."
    - "'You own them.' You don't remember when that stopped being a figure of speech."
    - "Someone new sits in the chair. Same charge. Same offer. Same answer."
  final_image: >
    The interrogation room. New person. Same chair. The cop says
    the words. The person nods. The cycle restarts. No one is
    watching. No one ever was.

# ============================================================
# PHASE GUIDANCE (15 min target)
# ============================================================
phase_guidance:
  description: >
    Recommended narrative weight distribution for 15-minute target.
    Word budget: 1755-2340 words at 130 WPM.
  phases:
    - phase: "HOOK + CONDITIONING"
      weight: "~8%"
      duration_approx: "0:00-1:15"
      content: "Hook (You don't arrest people. You collect them.) + introduce the CI program as tool. First patrol. First arrest that becomes a pitch."
      signature_use: "none yet"
      motif_use: "none yet"
    - phase: "FIRST FLIP"
      weight: "~18%"
      duration_approx: "1:15-4:00"
      content: "CI anchor introduced (won't look at you, hands shaking). First flip. First deploy. Weight of the deal felt. System phrase introduced: 'Work this off.'"
      signature_use: "'You own them' (clinical - first occurrence)"
      motif_use: "'You check the phone. Not the department one.' (conscious - first occurrence)"
      ci_anchor: "SCARED stage"
    - phase: "SYSTEM EXPANSION"
      weight: "~32%"
      duration_approx: "4:00-8:45"
      content: "Loop mutation cycles 2-4. More CIs. Second phone. Off-book meetings. CI anchor becomes dependent (calls at 2AM). Inventory mindset. Micro-hooks every 60-90s."
      retention_note: "This phase holds the middle. Loop mutation prevents predictability. Escalation lines: 'One buy becomes two. Two becomes a name. A name becomes a list.' Transition: 'You stop seeing faces. You see output.'"
      ci_anchor: "DEPENDENT stage - calls at 2AM, brings unsolicited names, asks when it ends"
    - phase: "SNAP + AFTERMATH"
      weight: "~20%"
      duration_approx: "8:45-11:45"
      content: "Foreshadow (2AM call unanswered, target carries). Deploy CI anchor. Phone rings. Breathing beat. Evidence destruction. 'You still have thirteen.'"
      signature_use: "'You own them' (possessive - second occurrence, post-snap)"
      motif_use: "'You check the phone' (automatic - but now checking for silence)"
      ci_anchor: "GONE stage"
    - phase: "IDENTITY + CONTAGION"
      weight: "~15%"
      duration_approx: "11:45-14:00"
      content: "Contagion (new detective learns the method). Memory reduction (charges remembered, faces forgotten). Signature line returns final."
      signature_use: "'You own them' (identity - third occurrence, permanent)"
      motif_use: "'You check the phone' (absent - phone erased, hand still reaches)"
    - phase: "ENDING LOOP"
      weight: "~7%"
      duration_approx: "14:00-15:00"
      content: "Same chair. Same charge. Same offer. Same answer. The machine continues. No one is watching."
      signature_use: "ending variation: 'You don't remember when that stopped being a figure of speech.'"

# ============================================================
# CREATIVE CONSTRAINTS
# ============================================================
creative_constraints:
  primary_rule: "OWNERSHIP_AS_ADDICTION"
  description: >
    The horror is not catching criminals. The horror is owning
    people. The CI system gives one cop the power to decide who
    goes to prison and who becomes a tool. No judge. No lawyer.
    No oversight committee. Just you and a charge and a choice
    you offer that is not really a choice. The substance is not
    violence (PV_0026) or fabrication (PV_0025). The substance
    is people. The addiction is ownership.
  subject_framing: >
    Subject starts believing the CI program serves justice. The
    transition to human ownership is shown through operational
    details - the second phone, the off-book meetings, the names
    that never appear in reports. The CI anchor character makes
    the transition visible - from a shaking person to a 2AM
    caller to a silence on the other end of the phone.
  ending_logic: >
    The ending lands on inventory as identity. The cop looks at
    the phone. Thirteen numbers. Each one is a person who cannot
    say no. The signature line returns final time - 'You own
    them' - but now it describes not what the cop does but who
    the cop is. The last image: the interrogation room. Someone
    new sits in the chair. Same charge. Same offer. Same answer.
  system_horror_rule: >
    NEVER explain the CI system through exposition. Show through
    what the system does NOT do: it does not track off-book CIs,
    does not audit handler meetings, does not limit how long
    someone can 'work off' a charge. The most powerful line about
    the system is: 'The department knows about six.' The viewer
    fills in the horror.
  ci_anchor_rule: >
    The CI anchor must appear in at least 3 phases. They are NOT
    named. They are recognized by pattern: the shaking hands,
    the 2AM calls, the question that never gets answered ('When
    does this end?'). The viewer must feel attached before the
    snap moment removes them.
  forbidden_framing:
    - "Heroic whistleblower or redemption arc"
    - "Single rogue cop - the system enables and rewards CI production"
    - "Glorification of handler skill as clever tradecraft"
    - "Pure psychopath - the original idealism must exist to make corruption possible"
    - "Explaining the CI system through exposition or legal terminology"
    - "Naming the CI anchor - recognition by pattern only"
    - "Showing the CI's death - only the silence on the phone"
  required_framing:
    - "'You own them' - 3x escalation: clinical -> possessive -> identity"
    - "Ending variation: 'You don't remember when that stopped being a figure of speech.'"
    - "'You check the phone. Not the department one.' - secondary motif 3x: conscious -> automatic -> absent"
    - "'Work this off' - system phrase 3-4x: genuine -> routine -> hollow -> unanswered"
    - "4-beat loop (catch, flip, deploy, squeeze) with MUTATION each cycle: hesitant -> efficient -> exploitative -> disposable"
    - "CI anchor across 3 stages: scared (shaking hands) -> dependent (2AM calls) -> gone (silence)"
    - "Snap moment: foreshadow (unanswered 2AM call) + event (phone rings) + sensory beat (breathing) + cold calculation ('still have thirteen')"
    - "Contagion: new detective learns the words, gets their own phone, runs their own list"
    - "Off-book CIs as the real corruption layer: 'The department knows about six'"
    - "Micro-hooks every 60-90s: curiosity gaps, tension-payoff pairs"
    - "Ending: same chair, same charge, same offer, same answer - the machine continues"

# ============================================================
# MICRO-BEHAVIORS (motif with progression)
# ============================================================
micro_behaviors:
  description: >
    Three signature micro-actions that repeat as motifs. Each
    one evolves across the episode. The repetition creates the
    rhythm - one motif return every 40-60 seconds of VO.
  frequency: "1 motif return every ~40-60 seconds of VO"
  behaviors:
    - motif: "THE_PHONE"
      description: "Checking the second phone."
      progression:
        - "You check the phone. Not the department one. You look around first."
        - "You check the phone before the department one. You stopped looking around."
        - "The phone is gone. Your hand still reaches for the pocket."
    - motif: "THE_PITCH"
      description: "The deal offered."
      progression:
        - "'Work this off or do the time.' You explain what it means. You mean it."
        - "'Work this off.' No explanation. They already know. Everyone knows."
        - "You don't say it anymore. You just look at the charge sheet. They nod."
    - motif: "THE_COUNT"
      description: "Counting CIs."
      progression:
        - "You have three. You know their names."
        - "You have nine. You know their charges."
        - "You have fourteen. You know their output."

