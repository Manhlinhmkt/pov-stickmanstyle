subject_variants:
  - type: "THE_BUILDER"
    trigger: "Starts with one CI. Builds a network. The network IS the career. Without it, arrest numbers collapse."
  - type: "THE_PROTECTOR_TURNED"
    trigger: "Genuinely believes CIs are protected. Stops protecting them when protection costs more than replacement."
  - type: "THE_INHERITED_HANDLER"
    trigger: "Takes over a CI list from a retiring detective. Inherits the second phone. Inherits the method."

# ============================================================
# FAILURE MECHANICS
# ============================================================
failure_mechanics:
  description: >
    The system occasionally cracks - a CI goes public, a defense
    attorney finds the pattern, an audit goes deeper than the
    registered files. But the real horror: even when exposed, the
    cop's defense is the truth - every bust was real. The drugs
    were real. The arrests were real. The method is invisible
    because the results are visible.
  pattern:
    - "A defense attorney notices the same CI code in twelve case files. Files a motion. The judge does not read it."
    - "A CI goes to the press. Your name is not in any file. Their word against your absence."
    - "Internal Affairs audits CI funds. Your registered CIs check out. The rest never existed on paper."
    - "A CI's family files a missing person report. You were the last person they called. The call was on the phone you already destroyed."

related_worlds:
