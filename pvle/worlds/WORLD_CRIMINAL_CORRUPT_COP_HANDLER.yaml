  - "You send a CI into a buy without a wire. Paperwork says otherwise."
  - "You keep a CI working past the original deal. The charge is your leverage forever."
  - "You send them into danger you understand. You do not warn them."
  - "One does not come back. You delete the number first. Then you delete the name."
  - "You teach the new detective how to flip. Your words come out of their mouth next month."
  - "You look at the phone. Fourteen numbers. You remember their charges. Not their faces."

