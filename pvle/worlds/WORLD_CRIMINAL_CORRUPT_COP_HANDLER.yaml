  - "off-book informant"

# ============================================================
# EMOTIONAL SPINE (ownership arc)
# ============================================================
emotional_spine:
  arc: "tool -> leverage -> inventory -> ownership"
  description: >
    The episode is not about catching criminals through informants.
    It is about what happens when a person discovers that owning
    other people feels like competence. The system calls it
    cooperation. The cop calls it management. The viewer watches
    it become possession. Each phase escalates the dehumanization -
    until the CI is not a person with a deal. The CI is a number
    on a phone the department does not know about.
  phase_mapping:
    tool: "First CI. The program is a tool. Justice is the goal. The weight of the deal is felt."
    leverage: "More CIs. The charge does not need to be serious. A bag of weed is enough. Leverage is leverage."
    inventory: "You manage them like accounts. Names, charges, phone numbers. Output per week."
    ownership: "They try to quit. You remind them the original charge still exists. They don't quit. They can't."

# ============================================================
# HOOK IDENTITY (viral-optimized, experiential)
# ============================================================
hook_identity:
  primary: >
    You don't arrest people.
    You collect them.
  alternates:
    - >
      Fourteen on your phone right now.
      Six exist on paper.
      The rest don't exist at all.
    - >
      They think they're working off a charge.
      They're working for you.
      Forever.
    - >
      You decide who goes to prison
      and who goes to work for you.
      Same charge. Different outcome.
      Your choice.

# ============================================================
# SIGNATURE LINE (repeats with escalating weight)
# ============================================================
signature_line:
  line: "You own them."
  escalation_pattern:
    occurrence_1:
      context: "After first flip. Describing the CI relationship to yourself."
      weight: "CLINICAL - operational. Describing a management dynamic."
      note: "The phrase feels like jargon. Professional distance."
    occurrence_2:
      context: "After snap moment. Looking at the phone. Thirteen numbers left."
      weight: "POSSESSIVE - ownership is no longer metaphor. It is literal."
      note: "Same words. The viewer hears them differently now."
    occurrence_3:
      context: "Ending. New person in the chair. Same charge. Same offer."
      weight: "IDENTITY - you don't run informants. You own people. This is who you are."
  ending_variation: >
    "You own them."
    You don't remember when that stopped being a figure of speech.

# ============================================================
# SECONDARY MOTIF (the second phone)
# ============================================================
secondary_motif:
  line: "You check the phone. Not the department one."
  description: >
    The second phone is the physical manifestation of the off-book
    system. It tracks the cop's relationship to secrecy. The
    signature line is what the cop believes. The secondary motif
    is what the cop does. The phone IS the corruption - it holds
    the names the system does not know about.
  escalation_pattern:
    early: "CONSCIOUS - You reach for the second phone. You look around first."
    mid: "AUTOMATIC - You check it before the department phone. It is your first instinct."
    end: "ABSENT - The phone is gone. You erased it. But your hand still reaches for the pocket."

# ============================================================
# SYSTEM PHRASE (the deal that never ends)
# ============================================================
system_phrase:
  line: "Work this off."
  description: >
    The equivalent of PV_0026's 'I feared for my life' and
    PV_0025's 'You don't find evidence. You place it.' This is
    the phrase the system uses to create compliance. It implies
    an endpoint that does not exist. The deal never ends because
    one buy leads to another name, another name leads to another
    buy, and the original charge never disappears.
  usage: >
    Appears 3-4 times. First: genuine offer. Second: routine
    phrase with no intention of clearing the debt. Third: the CI
    asks when it ends. You say it again. The viewer understands
    before the CI does - it never ends.
  key_lines:
    - "Work this off. Three words. They always say yes."
    - "One buy clears the charge. That is what you say. One buy becomes two. Two becomes a name. A name becomes a list."
    - "They ask when it ends. You say: one more. You always say one more."

# ============================================================
# CI ANCHOR CHARACTER (single person, three stages)
# ============================================================
ci_anchor:
  description: >
    One CI the viewer tracks across the episode. Not named. Known
    by pattern - visual details, behavioral tics, the 2AM calls.
    This person is the emotional throughline. The viewer watches
    them go from scared to dependent to gone. When the snap moment
    hits, the viewer loses someone they recognized.
  identification: "THE_ONE_WHO_CALLS_AT_2AM"
  stages:
    - stage: "SCARED"
      phase: "Phase 2 - First Flip"
      markers:
        - "This one won't look at you."
        - "Hands shaking."
        - "Keeps asking if this clears it."
      note: "Viewer meets them at their most vulnerable. First flip."
    - stage: "DEPENDENT"
      phase: "Phase 3 - System Expansion"
      markers:
        - "They call you at 2AM. Not to report. To ask if they're safe."
        - "They start bringing names you didn't ask for. Trying to stay useful."
        - "They ask when it ends. You say: one more."
      note: "The CI has become dependent on the handler. Stockholm dynamic."
    - stage: "GONE"
      phase: "Phase 4 - Snap Moment"
      markers:
        - "You send them somewhere new. You know the target carries."
        - "The phone rings. Not the department phone. The other one."
        - "You wait for breathing. There is none."
      note: "The viewer loses someone they recognized. The cop counts inventory."
  post_snap_line: "You still have thirteen."

# ============================================================
# CORE MECHANIC (4-beat POV loop with mutation)
# ============================================================
core_mechanic:
  name: "THE_INFORMANT_MACHINE"
  description: >
    The cop does not catch criminals. The cop catches people and
    converts them into tools. The skill is not investigation. The
    skill is leverage. Find someone vulnerable. Find their charge.
    Offer the deal. They say yes because the alternative is prison.
    They belong to you now. The system calls it cooperation. You
    call it inventory. Each loop mutates - the hesitation shrinks,
    the CIs become less human, the deals become less real.
  pov_loop:
    structure: "catch -> flip -> deploy -> squeeze"
    beats:
      - beat: "CATCH"
        line: "You find someone with a charge."
        note: "Target selection. Small enough to scare. Too small for a real case."
      - beat: "FLIP"
        line: "You offer the deal."
        note: "'Work this off or do the time.' Three words. They always say yes."
      - beat: "DEPLOY"
        line: "You send them in."
        note: "No training. No wire protocol. No extraction plan. They buy. You wait."
      - beat: "SQUEEZE"
        line: "You need more."
        note: "One buy is never enough. The debt never clears. They owe you another name."
  loop_mutation:
    description: >
      Each repetition degrades in BOTH empathy AND caution. The
      cop stops feeling the weight of the deal. The CIs stop
      being people and become units of output. By the final cycle,
      there is no hesitation, no weight, no person - just a number
      on a phone and a charge that never expires.
    progression:
      - cycle: 1
        label: "HESITANT"
        mutation: "First flip. You feel the weight. The CI cries. You almost stop."
        tempo: "SLOW - long pauses. You explain the deal carefully. You mean it when you say 'one buy.'"
        emotional_state: "guilt as friction"
      - cycle: 2
        label: "EFFICIENT"
        mutation: "Faster flip. Smaller charge. You don't explain - you pitch. The CI nods."
        tempo: "MEASURED - fewer pauses. The deal is rehearsed. The wording is optimized."
        emotional_state: "competence as justification"
      - cycle: 3
        label: "EXPLOITATIVE"
        mutation: "You stop caring if the charge is serious. A bag of weed is enough. Leverage is leverage."
        tempo: "FAST - no explanation. 'Work this off.' Three words. Next."
        emotional_state: "efficiency as identity"
      - cycle: 4
        label: "DISPOSABLE"
        mutation: "You send them into danger you understand. You do not warn them. If they don't come back, you delete the number."
        tempo: "COMPRESSED - no pause between deploy and squeeze. The CI is already the next assignment."
        emotional_state: "inventory management"

# ============================================================
# KEY FACTS (VO-ready + writer reference)
# ============================================================
key_facts:
  # --- Killer lines (short, cold, experiential) ---
  - "You catch someone with a bag. You don't book them. You recruit them."
  - "The deal is simple. Work this off or do the time. They always take the deal."
  - "One buy clears the charge. That is what you say. One buy becomes two. Two becomes a name. A name becomes a list."
  - "You don't file paperwork for every meeting. Paperwork creates witnesses."
  - "They call you from blocked numbers. You answer on a phone the department doesn't know about."
  - "You have fourteen CIs. The department knows about six."
  - "You decide who goes to prison and who goes to work for you. Same charge. Different outcome. Your choice."
  - "If they get hurt, you were never there. If they die, they were never yours."
  - "They try to quit. You remind them the original charge still exists. They don't quit."
  - "You tell them where to go. Who to buy from. How much. You are the architect. They are the hands."
  - "You stop seeing faces. You see output."
  - "Someone new sits in the chair. Same charge. Same offer. Same answer."

  # --- Retention hooks (curiosity-gap, deploy every 60-90s) ---
  - "You have fourteen." # curiosity
  - "The department knows about six." # gap
  - "They think it ends." # tension
  - "It doesn't." # payoff
  - "One more. You always say one more." # dread
  - "You still have thirteen." # cold calculation post-snap

  # --- System context (WRITER REFERENCE ONLY) ---
  - "[REF] Rachel Hoffman, 23, killed in 2008 during a police-directed drug buy in Tallahassee. No training, no backup protocol. Florida passed 'Rachel's Law' afterward - first state law to protect CIs."
  - "[REF] FBI agent John Connolly ran Whitey Bulger as CI for decades. Leaked identities of other informants to Bulger, who had them killed. Connolly convicted of second-degree murder 2008."
  - "[REF] DEA informant Andrew Chambers involved in over 300 cases, repeatedly lied under oath. DEA kept using him because he produced results. Dozens of convictions compromised."
  - "[REF] The Innocence Project: informant testimony contributed to approximately 15-20% of wrongful convictions later overturned by DNA."
  - "[REF] Most jurisdictions have no mandatory limit on how long a person can be kept as a CI. Some informants 'work off' charges for years with no formal endpoint."
  - "[REF] Officers often maintain 'off-book' informants - CIs not registered in departmental databases - to avoid oversight and information-sharing requirements."
  - "[REF] Many departments have no written policy requiring handlers to document CI meetings, payments, or deployments. The handler-CI relationship exists in a documentation void."

