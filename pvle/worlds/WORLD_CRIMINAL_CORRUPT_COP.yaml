# SUBJECT VARIANTS
# ============================================================
subject_variants:
  - type: "THE_NOBLE_CAUSE_COP"
    trigger: "Starts planting only on people they believe are guilty. The first plant feels like justice."
  - type: "THE_QUOTA_COP"
    trigger: "Plants to hit numbers. Does not care about guilt. Cares about the sergeant's whiteboard."
  - type: "THE_INHERITED_COP"
    trigger: "Learned from a senior partner who learned from theirs. Corruption is generational."

# ============================================================
# FAILURE MECHANICS
# ============================================================
failure_mechanics:
  description: >
    The system occasionally produces a crack - a witness phone,
    a camera angle, a public defender who reads. The real fear
    is not Internal Affairs. The real fear is the partner who
    might talk first.
  pattern:
    - "A witness has a phone. You did not see the phone."
    - "The public defender requests body camera footage. Your stomach drops."
    - "Internal Affairs calls you in. Your union rep says: say nothing."
    - "Someone files a complaint. The complaint goes to the same precinct."

