  - "The White House has 132 rooms across 6 floors — open to public tours, offering no privacy"
  - "Air Force One becomes a second home — travel is never spontaneous"
  - "A Secret Service code name is assigned — presidential children receive their own"
  - "Social media is prohibited or operated under monitored accounts"
  - "Press pool coverage follows major life events from first day of school to prom"
  - "Camp David (presidential retreat in Maryland) offers more privacy but equal isolation"
  - "After presidency ends, protection continues but at reduced intensity for years"

