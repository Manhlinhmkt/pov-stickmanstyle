era_anchors:
  - year: 1946
    age: 0
    event: "Born in the outer borough of New York, son of a property developer — wealth present, but not yet power"
  - year: 1959
    age: 13
    event: "Sent to military academy after behavior issues — father's method of installing discipline"
  - year: 1968
    age: 22
    event: "Graduated from business school — joined father's company with one instruction: win"
  - year: 1971
    age: 25
    event: "Took control of the family company, moved operations to Manhattan — refused to stay in the outer borough"
  - year: 1983
    age: 37
    event: "Completed 68-floor tower on Fifth Avenue — put his own name on it in gold letters six feet tall"
  - year: 1990
    age: 44
    event: "Near bankruptcy — $900 million in personal debt — restructured, refused to disappear"
  - year: 2004
    age: 58
    event: "Began hosting a reality television show — built a second identity on screen, not just in concrete"
  - year: 2015
    age: 69
    event: "Announced presidential campaign — the political establishment laughed"
  - year: 2016
    age: 70
    event: "Won. Nobody expected it. Including, some say, him."
  - year: 2021
    age: 74
    event: "Impeached for the second time. Left office. Refused to concede. Refused to disappear."
  - year: 2024
    age: 78
    event: "Indicted on federal charges — ran anyway. Won again."

unique_circumstance_stack:
  - "Father: a Queens property developer who taught that weakness is a choice and that losing is a form of death"
  - "Sent to military academy at 13 — learned early that structure and authority are things you either master or are mastered by"
  - "Took father's company and immediately moved it from the outer borough to Manhattan — geography as ambition"
  - "Filed for corporate bankruptcy six times — survived each time by putting his name on the next thing before the last one fell"
  - "Put his own name on buildings, steaks, water, casinos, universities, golf courses, and eventually a country"
  - "Became globally famous on television before he became globally powerful in politics"
  - "Won the most powerful elected office on earth in his first attempt at political office — no prior elected experience"
  - "Impeached twice — more than any other president — and still the story did not end"
  - "First former president in American history to be convicted of criminal charges — then elected again anyway"
  - "Supporters see a man who never quit. Critics see a man who never accepted accountability. Both are correct about the facts."

public_perception_markers:
  - "Perhaps the most polarizing public figure of the 21st century — no neutral opinion is possible"
  - "His name, on any object or building, immediately doubles both its appeal and its controversy"
  - "Decades of tabloid coverage, business coverage, political coverage — the man was always news"
  - "Even in defeat, he remained the dominant subject of conversation — losing changed nothing about his presence"

key_tensions:
  - BRAND_VS_PERSON: "The name became larger than the man — and the man had to keep expanding to stay ahead of it"
  - FATHER_SHADOW: "Fred Trump built the foundation. The son swore he would build higher. He did. It cost something."
  - PUBLIC_VS_PRIVATE: "Cameras everywhere, name everywhere — and yet the interior life remains almost entirely unknown"
  - WIN_VS_COST: "Every win came with a price. Every loss was refused, reframed, denied. The psychological cost of never losing is losing yourself."
  - LEGACY_ANXIETY: "What is the name worth when he is gone? The question everyone around him avoids asking."

