character_anchors:
  SUBJECT:
    veil_name: "you / the subject"
    real_name: "Donald J. Trump"   # INTERNAL ONLY
    subject_phase_traits:

      PHASE_EARLY:
        age_range: "6–18"
        life_phase_label: "Queens to Military Academy"
        height: "Normal child and teen proportions — athletic, energetic"
        hair: "Natural dark brown hair, neatly combed — no signature color yet"
        clothing: "Preppy outer-borough kid — blazer and slacks, military uniform at academy"
        face: "Dot eyes, small neutral mouth — young, unformed"
        distinguishing: "Slightly taller than peer stickmen. Sits differently — already watching the room."
        character_block: >
          Simple stickman, age-appropriate proportions, slightly taller than peers.
          Round white circle head, dot eyes, small neutral mouth. Thin black lines.
          Dark brown hair wisp, neat. Simple blazer or military jacket shape (flat color).

      PHASE_CONFLICT:
        age_range: "18–30"
        life_phase_label: "Building the Machine"
        height: "Tall adult stickman — full adult proportions"
        hair: "Dark brown hair, beginning to style upward — ambition showing in the hair"
        clothing: "Dark power suit shape, white collar line, simple tie line"
        face: "Dot eyes — more focused. Forward-directed."
        distinguishing: "Gestures more — arms raised, pointing. Takes more space in the frame."
        character_block: >
          Tall adult stickman, full proportions.
          Round white circle head, dot eyes, small neutral mouth. Thin black lines.
          Dark brown hair slicked upward. Dark suit flat fill, white collar line, dark tie.
          Expansive posture — arms gesturing outward.

      PHASE_CRISIS:
        age_range: "44–58"
        life_phase_label: "Near Bankrupt to Television Icon"
        height: "Tall adult stickman — substantial frame"
        hair: "Transitional — the hair begins its iconic transformation. Swept back, lightening to blonde-orange."
        clothing: "Dark suit, white collar, long red tie line (signature)"
        face: "Dot eyes — defiant. Never looking down."
        distinguishing: "The red tie appears for the first time. Long, distinctive vertical red line. Never tucked."
        character_block: >
          Tall adult stickman, substantial frame.
          Round white circle head, dot eyes, small neutral mouth. Thin black lines.
          Swept-back blonde-orange hair silhouette forming. Dark suit flat fill,
          white collar line, long red tie vertical line to below belt.

      PHASE_RESOLUTION:
        age_range: "58–70"
        life_phase_label: "The Apprentice to the Campaign"
        height: "Tall adult stickman — wide-shouldered, commanding"
        hair: "Full iconic swooped blonde-orange hair — volume forward, swept from side"
        clothing: "Dark suit, white collar line, LONG red tie line extending to mid-thigh"
        face: "Dot eyes — self-assured. The persona is complete."
        distinguishing: "The hair is the silhouette. Any stickman with this hair = immediately recognizable."
        character_block: >
          Tall wide-shouldered adult stickman.
          Round white circle head, dot eyes, small neutral mouth. Thin black lines.
          Swooped thick blonde-orange hair silhouette, volume prominent.
          Dark suit flat fill, white collar line, LONG red tie line from collar to mid-thigh.

      PHASE_PRESENT:
        age_range: "70–80"
        life_phase_label: "President to President Again"
        height: "Tall adult stickman — commanding but heavier frame implied"
        hair: "Full iconic swooped blonde-orange hair — same silhouette, same volume"
        clothing: "Dark suit, white collar line, extra-long red tie line — prominent"
        face: "Dot eyes — this is the face that the whole world knows, distilled to dots"
        distinguishing: "AGENTS always present. He is the center of every room. The hair and tie identify without name."
        character_block: >
          Tall heavy-framed adult stickman.
          Round white circle head, dot eyes, small neutral mouth. Thin black lines.
          Swooped thick blonde-orange hair silhouette — prominent.
          Dark suit flat fill, white collar line, EXTRA-LONG red tie line from collar to below mid-thigh.
          AGENTS flanking: FACELESS dark-suited stickman figures (blank white circle heads, earpiece dots, rigid posture).

  FATHER:
    veil_name: "your father"
    appears_in_phases: [PHASE_EARLY, PHASE_CONFLICT]
    visual_anchor: >
      Shorter stickman than SUBJECT. Round white circle head, dot eyes, small serious mouth.
      Grey hair flat silhouette, combed to one side. Dark suit flat fill, white collar line.
      Upright posture — commanding in a smaller frame.

  FIRST_WIFE:
    veil_name: "your first wife"
    appears_in_phases: [PHASE_CONFLICT, PHASE_CRISIS]
    visual_anchor: >
      Slim tall stickwoman. Round white circle head, dot eyes, small mouth.
      Voluminous light blonde hair shape. Elegant dress or business suit shape (flat color).
      Poised upright posture — businesswoman energy. Sits at the table, not beside it.

  SECOND_WIFE:
    veil_name: "your second wife"
    appears_in_phases: [PHASE_CRISIS]
    visual_anchor: >
      Slim stickwoman, shorter than FIRST_WIFE. Round white circle head, dot eyes, small mouth.
      Medium-length wavy hair silhouette, lighter tone. Casual-elegant outfit shape (flat color).
      Warmer posture — less formal, more social. Appears during flamboyant excess period.

  THIRD_WIFE:
    veil_name: "your third wife"
    appears_in_phases: [PHASE_RESOLUTION, PHASE_PRESENT]
    visual_anchor: >
      Very slim tall stickwoman. Round white circle head, dot eyes, small composed mouth.
      Sleek straight hair — dark to light gradient silhouette, long past shoulders.
      High-fashion outfit shape (flat color, strong silhouette). Upright, composed, contained.
      Rarely gestures broadly — presence through stillness.

  CHILDREN:
    veil_name: "your children"
    appears_in_phases: [PHASE_RESOLUTION, PHASE_PRESENT]
    visual_anchor: >
      Three adult-proportioned stickman/woman figures — dark suit shapes for sons,
      elegant outfit shape for daughter. All with SUBJECT's height roughly matched.
      Dot eyes, small neutral mouths. In PHASE_PRESENT: appear at campaign podium flanking.

  AGENTS:
    veil_name: "the agents"
    appears_in_phases: [PHASE_CONFLICT, PHASE_CRISIS, PHASE_RESOLUTION, PHASE_PRESENT]
    visual_anchor: >
      FACELESS dark-suited stickman figures — blank white circle heads, NO dot eyes,
      NO mouth. Small earpiece dots on head sides. Rigid upright symmetrical posture.
      Always flanking SUBJECT symmetrically.

  AIDES_BUSINESS:
    veil_name: "the associates"
    appears_in_phases: [PHASE_CONFLICT, PHASE_CRISIS]
    visual_anchor: >
      Generic shorter adult stickmen in dark suit shapes, white collar lines. Dot eyes,
      small neutral mouths. Carry briefcase or document rectangle shapes. Cluster around
      negotiation tables, boardrooms. Shorter than SUBJECT — always shorter.
      In PHASE_CRISIS: some have arms-raised panic gestures, clipboard shapes,
      phone-to-ear gestures (conveying urgent restructuring communications).

  AIDES_CAMPAIGN:
    veil_name: "the campaign team"
    appears_in_phases: [PHASE_RESOLUTION, PHASE_PRESENT]
    visual_anchor: >
      Generic shorter adult stickmen and stickwomen in dark suit shapes. Dot eyes,
      small neutral mouths. In PHASE_RESOLUTION: clustered around a strategy table,
      phone shapes, chart/map shapes in background. In PHASE_PRESENT: flanking
      campaign rally podium — headset dots on some, clipboard shapes on others.
      Energetic postures, arms gesturing toward SUBJECT or toward crowd.

  CROWD:
    veil_name: "the crowd"
    appears_in_phases: [PHASE_PRESENT]
    visual_anchor: >
      Large mass of generic stickmen at varying heights — rally/event background element.
      Arms raised in various directions, suggesting cheer or protest depending on context.
      No individual detail — pure collective mass. Cap-silhouette shapes visible on some
      (rally context). Fills background frame behind campaign podium.

