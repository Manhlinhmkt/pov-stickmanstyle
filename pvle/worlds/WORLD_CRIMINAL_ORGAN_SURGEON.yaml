# CREATIVE CONSTRAINTS (episode-level enforcement)
creative_constraints:
  primary_rule: "INSIDE_THE_OPERATING_ROOM"
  description: >
    Unlike the broker (PV_0015) who never sees the blood, the surgeon IS the blood.
    The narrative lives in the hands - the same hands that once healed now extract.
    The horror is not in violence but in clinical precision applied to monstrous purpose.
  subject_framing: >
    Subject is a trained medical professional whose skills are weaponized.
    The core mechanism is the corruption of expertise - using healing knowledge to harm.
    Self-rationalization through medical logic: 'the recipient needs this to live.'
  forbidden_framing:
    - "Gratuitous gore or surgical fetishism"
    - "Power fantasy or cool-surgeon trope"
    - "Victim-blaming or dehumanizing donors"
    - "Subject as willing psychopath from the start"
  required_framing:
    - "Gradual moral descent - not sudden evil"
    - "Clinical detachment as defense mechanism"
    - "Hands as recurring motif - healing vs. harvesting"
    - "The moment of recognition in a donor's eyes"
    - "Ending lands on inability to return to legitimate medicine"

