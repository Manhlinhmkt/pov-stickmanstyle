key_facts:
  - "Surgeons in trafficking networks are the scarcest and most protected asset - without them, the entire operation collapses"
  - "Many trafficking surgeons were once legitimate doctors who lost licenses, accumulated debt, or were coerced into the network"
  - "A single kidney extraction takes 2-4 hours - the surgeon works in silence knowing the donor may not have consented"
  - "Trafficking networks pay surgeons $20,000-$50,000 per operation - ten times what they earned legally in their home country"
  - "Some victims are kidnapped and wake up in unfamiliar rooms with fresh surgical scars and no memory of what happened"
  - "Surgeons must perform without full medical teams - often with minimal anesthesia, improvised equipment, and no post-operative care plan for donors"
  - "The Hippocratic Oath - 'First, do no harm' - is the oldest ethical code in medicine, dating back to ancient Greece"
  - "Trafficking surgeons rationalize by telling themselves the recipient will die without the organ - reframing extraction as saving a life"
  - "Once inside the network, surgeons cannot leave - they know too much about locations, patients, and the organization"
  - "Medical boards in multiple countries have documented cases of licensed surgeons moonlighting in illegal transplant operations"

