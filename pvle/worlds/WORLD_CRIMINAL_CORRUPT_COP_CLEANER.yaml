  - WORLD_CRIMINAL_CORRUPT_COP_HANDLER
series_note: >
  Fourth episode in the corrupt cop series. PV_0025 explored
  evidence fabrication (THE_MANUFACTURED_CASE) - signature:
  'You don't find evidence. You place it.' PV_0026 explored
  lethal force as addiction (THE_CALCULATED_SHOT) - signature:
  'I feared for my life.' PV_0027 explored human ownership
  through the CI system (THE_INFORMANT_MACHINE) - signature:
  'You own them.' PV_0028 explores reality erasure through
  scene cleaning (THE_SANITIZED_SCENE) - signature: 'By the
  time you leave, it never happened.' Connecting thread: all
  four cops operate inside a system that never asks. Each
  signature phrase creates a reality the system accepts without
  verification. The difference: PV_0025 fabricates evidence.
  PV_0026 fabricates self-defense. PV_0027 fabricates cooperation.
  PV_0028 fabricates the scene itself. The cleaner is the final
  link - without the cleaner, the other three would be visible.
  The cleaner makes the system airtight.

