# ============================================================
# EMOTIONAL SPINE (erasure arc)
# ============================================================
emotional_spine:
  arc: "witness -> accessory -> architect -> author"
  description: >
    The episode is not about a cop who commits crimes. It is about
    the cop who arrives AFTER the crime and makes it disappear. The
    system does not need a cover-up. The system has a person whose
    skill is making reality match the report. Each phase escalates
    the erasure - until the cleaner cannot tell the difference
    between what happened and what they made the scene say. The
    truth does not get buried. The truth gets replaced.
  phase_mapping:
    witness: "You see something wrong. You say nothing. That is the first clean."
    accessory: "You help. Move one thing. Coach one phrase. The story holds."
    architect: "You design the scene. You know where evidence needs to be. You know what the camera can verify."
    author: "You write the official version. Not what happened. What needs to have happened. And it becomes the truth because you wrote it."

# ============================================================
# HOOK IDENTITY (viral-optimized, experiential)
# ============================================================
hook_identity:
  primary: >
    You arrive second.
    By the time you leave,
    it never happened.
  alternates:
    - >
      They call you when the scene
      doesn't match the story.
      You make it match.
    - >
      You don't commit crimes.
      You erase them.
      Thirty-seven times and counting.
    - >
      The report is finished before
      you see the scene.
      Your job is making the scene agree.

# ============================================================
# SIGNATURE LINE (repeats with escalating dissolution)
# ============================================================
signature_line:
  line: "By the time you leave, it never happened."
  escalation_pattern:
    occurrence_1:
      context: "After first real clean. Describing the result to yourself."
      weight: "CLINICAL - operational. Describing what a clean scene means."
      note: "The phrase feels like professionalism. Job well done."
    occurrence_2:
      context: "After snap moment. Looking at a scene you already changed. Unable to remember the original."
      weight: "DISSOCIATIVE - the fabrication has replaced memory. The words describe not what you did but what you have become."
      note: "Same words. The viewer hears them as confession now."
    occurrence_3:
      context: "Ending. New call. New scene. Same work."
      weight: "IDENTITY - you don't clean scenes. You author reality. This is who you are."
  ending_variation: >
    "By the time you leave, it never happened."
    You don't remember what "it" was anymore.

# ============================================================
# SECONDARY MOTIF (the assessment beat)
# ============================================================
secondary_motif:
  line: "You step back. You look at the scene."
  description: >
    The assessment beat. The cleaner steps back from the scene
    they have altered and examines it the way a painter examines
    a canvas. This is the moment between the physical work and
    the narrative work. Between moving things and writing the
    story. The motif tracks the cop's relationship to their own
    fabrication - from conscious evaluation to automatic scan to
    a moment where they step back and see something that looks
    right but cannot explain why.
  escalation_pattern:
    early: "CONSCIOUS - You step back. You look at the scene. You check if it matches the story you need."
    mid: "AUTOMATIC - You step back. It already matches. You knew it would. Your hands know the work."
    end: "ABSENT - You step back. You look at the scene. It looks right. You don't know why."

# ============================================================
# SYSTEM PHRASE (the coaching command)
# ============================================================
system_phrase:
  line: "Tell me again."
  description: >
    The phrase the cleaner uses to coach other officers through
    their statements. When the first version of the story will
    not hold up, the cleaner says 'Tell me again.' The officer
    restarts. The cleaner stops them at the wrong parts. 'Tell
    me again.' By the third time, the story is clean. It always
    takes three times.
  usage: >
    Appears 3-4 times. First: genuine coaching of a shaken
    officer after a bad shooting. Second: routine direction -
    the cleaner says it like a film director giving notes.
    Third: the cleaner says it to themselves - reconstructing
    their own memory of a scene they can no longer verify.
  key_lines:
    - "Tell me again. Start from when you arrived. Not from when it started."
    - "Tell me again. Skip the part about the hands. They were not up. They were reaching."
    - "Tell me again. You sound like you're lying. You need to sound like you're remembering."

# ============================================================
# SCENE ANCHOR (THE HANDS - sensory thread)
# ============================================================
scene_anchor:
  description: >
    One specific sensory detail the viewer tracks across the
    episode. Not a legal case. Not a witness. The hands. The
    position of the victim's hands. The cleaner repositions
    them in Phase 2. The detail keeps surfacing - an autopsy
    note, a photo angle, a report line. Each time, the cleaner
    adjusts the story. Until the cleaner looks at a scene and
    cannot remember where the hands were before they moved them.
    The hands become the visual thread that makes memory erosion
    tangible. The viewer REMEMBERS what the cleaner moved. The
    cleaner does not. That gap is the horror.
  identification: "THE_HANDS"
  sensory_anchor: "the position of the victim's hands"
  stages:
    - stage: "FIRST_CLEAN"
      phase: "Phase 2 - First Real Clean"
      markers:
        - "The hands are up. Palms open. That is not self-defense. You reposition them. One on the waistband. One reaching."
        - "You coach the officer. Tell me again. Third time, the story holds."
        - "Report filed. Scene cleared. You drive home."
      note: "Viewer sees the specific physical act. Hands repositioned. Small. Precise. Clinical. The viewer will remember this."
    - stage: "RESURFACING"
      phase: "Phase 3 - System Expansion"
      markers:
        - "The autopsy report notes bruising inconsistent with the hand position in the photos."
        - "You call the officer. 'The hands. Were they up or down when you arrived?' The officer pauses. 'Down. No. Up. I think up.'"
        - "You adjust one line in the report. 'Hands were observed reaching toward waistband.' One line changes everything."
      note: "The hands are cracking the story. The cleaner patches. But the detail is specific enough that the viewer REMEMBERS it from Phase 2."
    - stage: "REPLACED"
      phase: "Phase 4 - Snap Aftermath"
      markers:
        - "Internal review pulls the file. You read your own report. 'Hands reaching toward waistband.'"
        - "You try to remember. Were the hands up or down when you arrived? You wrote 'reaching.' You remember 'reaching.' But you moved them."
        - "The fabrication has become your memory of the hands. The original position is gone."
      note: "The viewer watched the cleaner move the hands in Phase 2. The cleaner can no longer access that memory. The viewer can. That asymmetry IS the horror."
  post_snap_line: "You read the report. 'Hands reaching toward waistband.' You wrote it. You moved them. You remember reaching. Not up. Not open. Reaching. Because that is what you wrote."

# ============================================================
# CORE MECHANIC (4-beat POV loop with friction overlay)
# ============================================================
core_mechanic:
  name: "THE_SANITIZED_SCENE"
  description: >
    The cop does not commit crimes. The cop makes crimes
    disappear. The skill is not violence or fabrication. The
    skill is forensic narrative - making a scene tell a story
    that never happened. Moving a gun two inches. Removing a
    shell casing. Coaching the words. Writing the report. By
    the time the cleaner leaves, the scene is not a crime scene.
    It is a story the system can accept.
  pov_loop:
    structure: "arrive -> read -> alter -> author"
    beats:
      - beat: "ARRIVE"
        line: "You get the call."
        note: "Not from dispatch. From a cop who needs the scene fixed. You always answer."
      - beat: "READ"
        line: "You read the scene."
        note: "Not for evidence. For problems. What doesn't match. What the camera saw. What the report needs to say."
      - beat: "ALTER"
        line: "You fix it."
        note: "Small changes. A gun moved. A casing pocketed. A camera battery pulled. The scene matches the story now."
      - beat: "AUTHOR"
        line: "You write the report."
        note: "The report is what happened. Not what you saw. What you wrote. Ink makes it real."
  friction_layer:
    description: >
      Not every scene is simple. Starting from cycle 2, the loop
      encounters FRICTION - problems that resist clean resolution.
      A detail that contradicts. Two things that cannot both be
      true. A fix that creates a new problem. Friction prevents
      the video from becoming monotone escalation. It creates
      micro-decisions that hold retention in the middle section.
    note: >
      Friction appears between READ and ALTER. The cleaner reads
      the scene, finds a problem they cannot cleanly solve, must
      choose which version of the lie to commit to. This is NOT
      a formal 5th beat - the 4-beat structure stays clean and
      mirrors the other 3 episodes. Friction is an overlay that
      appears in specific cycles only.
  loop_mutation:
    description: >
      Each repetition degrades in BOTH hesitation AND precision.
      The cleaner stops feeling the weight of the alteration. The
      scenes stop being specific and become procedural. By the
      final cycle, the cleaner does not assess before altering.
      They alter before assessing. The compulsion to clean has
      replaced the judgment to evaluate. The distinction between
      memory and fabrication is gone.
    progression:
      - cycle: 1
        label: "RELUCTANT"
        mutation: "First real clean. You hesitate before touching anything. You tell yourself it is just procedure."
        tempo: "SLOW - you look at every detail twice. You feel the weight of what you are changing."
        emotional_state: "guilt as friction"
        friction: null
        friction_note: "No friction. Scene is straightforward. Establishes the baseline clean."
      - cycle: 2
        label: "COMPETENT"
        mutation: "Second clean. Faster. You know where to look. You know what to move."
        tempo: "MEASURED - efficient movements. No hesitation. The work is familiar."
        emotional_state: "skill as justification"
        friction: >
          Two problems. The gun position says self-defense but the
          casings say the shooter was moving. You can fix the gun
          or the casings. Not both. You choose the gun. The casings
          become a crack someone might find later.
        friction_note: "First time the cleaner faces a choice. Creates latent tension - the unfixed detail is a time bomb the viewer tracks."
      - cycle: 3
        label: "PREEMPTIVE"
        mutation: "You arrive and start working before anyone tells you what happened. You read the scene. You already know what it needs to say."
        tempo: "FAST - you are changing things while still reading. Assessment and alteration are the same step."
        emotional_state: "instinct replaces thought"
        friction: >
          A body camera was recording. You pull the battery. But
          the camera was cloud-syncing. You don't know how much
          uploaded. You clean the scene anyway. You write the
          report knowing there might be footage that contradicts it.
        friction_note: "Friction becomes ambient uncertainty. The cleaner proceeds DESPITE knowing the clean may not hold. This is the transition from skill to compulsion."
      - cycle: 4
        label: "AUTONOMOUS"
        mutation: "You clean a scene that did not need cleaning. The shooting was justified. But your hands moved first. You have already changed three things before you realize it was clean."
        tempo: "COMPRESSED - there is no pause between arrive and alter. You are already working."
        emotional_state: "compulsion overrides assessment"
        friction: null
        friction_note: "No external friction needed. The friction is INTERNAL - the cleaner's own automation is the problem. This IS the snap moment."

# ============================================================
# KEY FACTS (VO-ready + writer reference)
# ============================================================
key_facts:
  # --- Killer lines (short, cold, experiential) ---
  - "You arrive second. The truth leaves first."
  - "You don't touch evidence. You adjust it."
  - "Two inches. That is all it takes. Two inches turns an execution into self-defense."
  - "The gun was in his hand when you arrived. It was not. But it was when the photos were taken."
  - "You coach them like an acting teacher. 'Don't say you fired. Say the weapon discharged.'"
  - "The body camera battery died. You know because you pulled it yourself."
  - "Thirty-seven scenes. Not one investigation. Not one question."
  - "The report is finished before you see the scene. Your job is making the scene agree."
  - "You don't commit crimes. You erase them. The system does not call it a cover-up. The system calls it scene management."
  - "Tell me again. Start from when you arrived. Not from when it started."
  - "The rookie saw everything. You tell them what they saw. They nod. Tomorrow they will remember your version."
  - "Someone new calls. Same panic. Same silence. Same work."
  - "You fix what happened. Or you fix what they say happened. You stopped knowing the difference."
  - "You remember the report. You don't remember the scene."
  - "You step back. You look at the scene. It looks right. You don't know why."

  # --- Retention hooks (curiosity-gap, deploy every 60-90s) ---
  - "Thirty-seven scenes." # scale
  - "Not one question." # system complicity
  - "Two inches." # the horror of small changes
  - "The battery died." # euphemism as horror
  - "Tell me again." # coaching
  - "You can't remember the original." # identity dissolution
  - "The hands." # sensory anchor - scene anchor thread

  # --- System context (WRITER REFERENCE ONLY) ---
  - "[REF] Walter Scott (2015): Officer Slager shot Scott in the back while fleeing. Bystander video appeared to show Slager picking up his Taser and dropping it near Scott's body. Only discovered because bystander filmed from distance."
  - "[REF] Laquan McDonald (2016): Chicago officers' reports contradicted dashcam video. Burger King surveillance footage near scene reportedly had 86-minute gap. Multiple officers' written accounts aligned with each other but not with video."
  - "[REF] Baltimore Gun Trace Task Force: officers carried replica firearms and BB guns to plant at scenes of unjustified force. Convicted 2018."
  - "[REF] 'Drop gun' or 'throw-down weapon': unregistered firearm carried by officers to place near subjects after unjustified shootings. Documented across departments for decades."
  - "[REF] Many departments allow officers 48-72 hours before giving formal statements after shootings - termed 'cooling off period' - enabling consultation with attorneys and alignment of accounts."
  - "[REF] In most US jurisdictions, the same department that employs the officer investigates the officer-involved shooting. Independent investigation is the exception."
  - "[REF] DOJ pattern-or-practice investigations in Cleveland, Chicago, Baltimore, and Ferguson all documented systematic failures in preserving scene evidence and investigating officer-involved incidents independently."
  - "[REF] 'Scene integrity' is the legal standard for evidence preservation - but the first responders to secure the scene are often colleagues of the officer involved in the incident."

