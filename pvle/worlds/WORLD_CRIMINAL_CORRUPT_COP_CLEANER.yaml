# ============================================================
# SUBJECT VARIANTS
# ============================================================
subject_variants:
  - type: "THE_SILENT_WITNESS"
    trigger: "Starts with silence. Saw something wrong. Said nothing. Silence became skill. Skill became identity."
  - type: "THE_FORENSIC_MIND"
    trigger: "Crime scene training used in reverse. Knows what investigators look for. Removes it before they arrive."
  - type: "THE_INHERITED_CLEANER"
    trigger: "Learned from a senior cop who cleaned for twenty years. Inherited the method. Inherited the phone number people call."

# ============================================================
# FAILURE MECHANICS
# ============================================================
failure_mechanics:
  description: >
    The system occasionally cracks - a bystander video, a medical
    examiner who writes what they found, a federal investigation.
    But the real horror: even when cracks appear, the cleaner
    patches them. One line changed in a report. One witness
    coached again. The system does not need to be perfect. It
    just needs to be faster than the truth.
  pattern:
    - "A bystander recorded the scene before you arrived. The video shows what was there. Not what you made."
    - "The medical examiner's report contradicts the scene. Entry angle does not match position. You call: 'Can you review the positioning again?'"
    - "A federal pattern-or-practice investigation opens. Your scenes are in the data. But the reports are pristine. They always are."
    - "A journalist files FOIA for scene photos. The photos match your version. Because the photos were taken after you finished."

related_worlds:
