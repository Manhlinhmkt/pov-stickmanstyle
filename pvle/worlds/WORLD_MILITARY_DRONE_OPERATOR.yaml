key_facts:
  - "US Air Force RPA pilots train for approximately 1 year through Undergraduate Pilot Training then a specialized RPA pipeline before qualifying on the MQ-9 Reaper"
  - "Operators work rotating shifts (days, swings, mids) from Ground Control Stations - often at Creech AFB, Nevada - thousands of miles from the combat zone"
  - "Before a strike, operators conduct Pattern of Life surveillance - watching a target's daily routines, family interactions, and movements for weeks or months"
  - "After a strike, operators must stay on target for Battle Damage Assessment - watching the aftermath in high-definition"
  - "Operators experience psychological whiplash - transitioning from a lethal combat mission to suburban family life in the same day"
  - "PTSD rates among drone operators are comparable to those of combat-deployed personnel, despite never being physically in danger"
  - "The RPA community has historically faced stigma from the broader fighter-pilot culture - being told their experience does not count"
  - "A single Reaper orbit provides 24-hour persistent surveillance coverage, requiring crews to rotate continuously"

