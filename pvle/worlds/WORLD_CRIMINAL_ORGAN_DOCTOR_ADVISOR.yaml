pipeline_position:
  description: >
    In the organ trafficking pipeline, each role occupies a distinct
    function. The doctor is the FILTER - the checkpoint between
    procurement and extraction.
  chain: "Recruiter (find) -> Broker (connect) -> Doctor (filter) -> Surgeon (extract) -> Buyer (consume) -> Donor (source)"
  role: "FILTER"
  upstream: "Broker sends candidates"
  downstream: "Cleared donors go to Surgeon"
  unique_power: "The only person who can say NO on medical grounds - and whose NO the network respects"

series_note: >
  Sixth perspective in organ trafficking series. The medical gatekeeper -
  the person whose clinical judgment is the bottleneck of the entire chain.
  Without the doctor's clearance, no organ moves. The invisible checkpoint
  between broker and surgeon. The horror is not what they do - it is that
  what they do looks exactly like medicine.

