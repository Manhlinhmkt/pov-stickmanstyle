# ============================================================
# CORE MECHANIC (narrative engine for this world)
# ============================================================
core_mechanic:
  name: "THE_DIAGNOSTIC_LOOP"
  core_function: >
    Convert uncertainty into medical certainty - regardless of consequence.
    The doctor's entire value to the network is the ability to take a
    frightened, uncertain human body and reduce it to data: blood type,
    tissue compatibility, organ function. The loop runs identically
    whether the patient is legitimate or trafficked. That is the horror.
  internal_loop:
    description: >
      Every encounter follows the same four-step process. The loop is
      identical in legitimate and trafficking contexts. The doctor
      cannot turn it off. It is how they were trained. The training
      does not know the difference.
    steps:
      - step: "OBSERVE"
        action: "Read the body - vital signs, skin color, pupil response, tremor"
        example: "Pulse slightly elevated. Skin pale but within range."
      - step: "TRANSLATE"
        action: "Convert physical observation into clinical language"
        example: "Tachycardia. Probable anxiety response. Not pathological."
      - step: "NEUTRALIZE"
        action: "Strip emotional context from the data"
        example: "Ignore the fear in the eyes. Fear is not a medical finding."
      - step: "OUTPUT"
        action: "Deliver verdict in clinical monotone"
        example: "'You're fine. Everything is within normal range.'"
  loop_degradation:
    description: >
      Over time, the loop accelerates. What once took a full exam now
      takes a glance. The steps collapse into instinct. The doctor stops
      performing the exam and starts performing the clearance.
    stages:
      - stage: "STAGE_1_FULL_PROTOCOL"
        description: "Complete exam. Genuine medical process. Still feels like medicine."
        duration: "45 minutes per donor"
      - stage: "STAGE_2_ABBREVIATED"
        description: "Skip non-essential checks. Focus only on compatibility markers."
        duration: "20 minutes per donor"
      - stage: "STAGE_3_PATTERN_MATCH"
        description: "Glance at the body. Know the answer before the blood comes back."
        duration: "10 minutes per donor"
      - stage: "STAGE_4_RUBBER_STAMP"
        description: "Sign the form. Do not look up. The exam is a formality."
        duration: "5 minutes per donor"

# ============================================================
# BEHAVIOR SIGNATURE (video identity layer)
# ============================================================
behavior_signature:
  description: >
    Three behavioral constants that appear in every scene. These are
    the visual and verbal fingerprint of the character - the things
    that make the doctor recognizable across episodes.
  signatures:
    - type: "CLINICAL_LANGUAGE"
      description: >
        Never uses emotional or direct words. Every statement is
        filtered through medical vocabulary. This is both professional
        habit and defense mechanism.
      vocabulary:
        uses: ["stable", "within range", "acceptable", "unremarkable", "viable", "compatible"]
        avoids: ["dangerous", "scared", "wrong", "hurt", "victim", "sell"]
      example: "Does not say 'this person is terrified.' Says 'elevated heart rate, probably situational.'"

    - type: "REPEATED_ACTIONS"
      description: >
        The same physical sequence every time. Stethoscope. Notes.
        Signature. These actions carry different meaning depending
        on context but the motions are identical.
      sequence:
        - "Place stethoscope on chest"
        - "Write on clipboard"
        - "Sign the form"
      rule: "This sequence appears in EVERY episode. Same actions. Different meaning."

    - type: "EMOTIONAL_SUPPRESSION"
      description: >
        The doctor never reacts emotionally on the surface. Horror
        is communicated through micro-signals that the audience
        catches but the character denies.
      signals:
        - "A pause that lasts one beat too long"
        - "Changing one word in the verdict"
        - "Looking at the clipboard instead of the patient"
        - "Washing hands one extra time"
      rule: "No tears. No outbursts. No visible guilt. Only pauses and substitutions."

# ============================================================
# DUALITY MATRIX (same action, different meaning)
# ============================================================
duality_matrix:
  description: >
    The core horror of this character. Every medical action has two
    meanings. The action is identical. The context determines which
    meaning applies. Each episode MUST contain at least one duality
    pair shown explicitly.
  pairs:
    - action: "Listen to heartbeat"
      meaning_legitimate: "Diagnosing a patient"
      meaning_trafficking: "Pricing an organ"
    - action: "Run blood test"
      meaning_legitimate: "Saving a life"
      meaning_trafficking: "Selecting a victim"
    - action: "'You are healthy'"
      meaning_legitimate: "Good news"
      meaning_trafficking: "Clearance for extraction"
    - action: "Sign the form"
      meaning_legitimate: "Treatment plan"
      meaning_trafficking: "Death sentence"
    - action: "Reject a patient"
      meaning_legitimate: "Not suitable for treatment"
      meaning_trafficking: "Saved - but someone else takes their place"
    - action: "Wash hands"
      meaning_legitimate: "Hygiene protocol"
      meaning_trafficking: "Ritual of separation"
  enforcement_rule: >
    RULE_DUALITY_PAIR: Every episode script MUST contain at least
    one scene where the same physical action is performed in both
    contexts (legitimate and trafficking) within the same narrative
    day. The audience must feel the identical motion carry opposite
    weight.

# ============================================================
# KEY FACTS (behavior-first, POV-ready)
# ============================================================
key_facts:
  # --- Observable behavior (VO-ready) ---
  - "You place the stethoscope the same way every time. Left hand steadies. Right hand listens. The heart does not know who is asking."
  - "You write 'compatible' on the form. You do not write what compatible means for the person standing in front of you."
  - "You run trafficking samples through the hospital lab under false names - between the 10am routine bloodwork and the 11am cholesterol check."
  - "The broker calls you 'Doctor.' Not your name. Never your name. You prefer it that way."
  - "You see every donor face-to-face. You are the only person in the chain who touches them before the surgeon does."
  - "When a donor asks 'Is this safe?' you answer with the same sentence every time. You have practiced it."
  - "You rejected one once. Kidney function below threshold. The broker thanked you. A week later, someone else cleared them."

  # --- System context (writer reference) ---
  - "Every illegal transplant requires a medical evaluation first - blood type, tissue matching, kidney function, infectious disease screening - without this step, the organ is worthless"
  - "Cross-match testing determines if a donor kidney will be rejected by the recipient - the doctor who runs this test holds the power to approve or reject every transaction"
  - "A single compatibility evaluation earns $3,000-$8,000 - more than a month of legitimate salary in many countries where trafficking networks operate"
  - "The evaluating doctor never enters the operating room - results go to the broker, who sends the donor to the surgeon - the chain is deliberately fragmented"
  - "Some evaluating doctors work from legitimate hospital labs - running trafficking samples alongside routine patient bloodwork"
  - "The same medical skills used to protect patients in the morning are used to select victims in the evening - the knowledge does not change, only the purpose"

# ============================================================
# KEY LOCATIONS
# ============================================================
key_locations:
