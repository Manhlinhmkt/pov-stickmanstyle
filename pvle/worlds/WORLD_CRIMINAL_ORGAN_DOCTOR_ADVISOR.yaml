# ============================================================
# SUBJECT VARIANTS (operational modes)
# ============================================================
subject_variants:
  - type: "THE_MOONLIGHTER"
    mode_name: "Split Identity Mode"
    trigger: "Legitimate doctor who evaluates donors after hours for extra income"
    operating_pattern: >
      Day: heal patients. Evening: evaluate donors. Same skills, same
      hands, different purpose. The split is maintained through routine -
      the doctor changes clothes, drives to a different location, and
      becomes a different version of themselves. The horror is how
      seamlessly the transition happens.
    tone: "Clinical calm with undertow of dissonance"

  - type: "THE_DEBT_DOCTOR"
    mode_name: "Justification Engine"
    trigger: "Medical school debt or family obligation drove them into the network"
    operating_pattern: >
      Every clearance has a medical justification. 'Without proper
      testing they would use a less careful doctor.' 'I am making it
      safer.' 'The donor chose this.' The justification engine never
      stops. It generates new reasons faster than guilt can accumulate.
      The doctor never admits they are wrong because the logic is
      technically correct. That is the trap.
    tone: "Calm authority - every statement backed by medical logic"

  - type: "THE_TRAPPED"
    mode_name: "Compliance Lock"
    trigger: "Tried to leave but the network holds evidence of every evaluation they signed"
    operating_pattern: >
      The doctor is not panicking. They are locked. Every lab
      requisition they signed, every false name they used, every
      clearance form with their handwriting - the network keeps copies.
      Leaving means exposure. Exposure means prison and loss of license.
      The trap is not emotional. It is bureaucratic. The same paperwork
      that runs the system is the chain that holds them.
    tone: "Mechanical precision masking total absence of agency"

  - type: "THE_EFFICIENCY_OPTIMIZER"
    mode_name: "System Drift Mode"
    trigger: "Started careful, became fast - now optimizes the process without being asked"
    operating_pattern: >
      The most dangerous variant. No longer just clearing donors but
      actively improving the system - suggesting better screening
      protocols, recommending timing, flagging optimal donor profiles.
      The doctor has stopped being a reluctant participant and become
      an efficiency consultant. They do not notice the transition.
    tone: "Professional pride in work that should horrify"

# ============================================================
# DECISION FORK CATALOG (world-level scalability)
# ============================================================
decision_fork_catalog:
  description: >
    Each fork represents a situation where the doctor must choose.
    Each choice leads to a different narrative outcome. Forks are
    used for multi-episode scalability - same world, different
    decisions, different stories.
  forks:
    - id: FORK_INCOMPATIBLE_PRESSURE
      catalyst: "Broker demands approval for an incompatible donor"
      choices:
        - choice: "APPROVE"
          consequence: "Betray medical expertise. Donor may die on the table. Doctor responsible."
        - choice: "REJECT"
          consequence: "Network finds another doctor. Less careful. Donor still goes. Doctor 'clean' but complicit."
        - choice: "DELAY"
          consequence: "Request retesting. Buy time. Prolong donor's captivity. No resolution."

    - id: FORK_DONOR_RECOGNITION
      catalyst: "Donor from trafficking evaluation appears at legitimate clinic"
      choices:
        - choice: "ACKNOWLEDGE"
          consequence: "Risk exposure. The donor knows your face. The two worlds collide."
        - choice: "IGNORE"
          consequence: "Treat as stranger. The donor's eyes tell you they remember. You look at the clipboard."
        - choice: "REFER_OUT"
          consequence: "Send them to another doctor. Paper trail. Questions."

    - id: FORK_CHILD_SAMPLE
      catalyst: "Broker sends blood sample from a minor"
      choices:
        - choice: "REFUSE"
          consequence: "The line you will not cross. But it confirms every other line was already crossed."
        - choice: "PROCESS"
          consequence: "The line dissolves. There was never a line. Only convenience."
        - choice: "REPORT"
          consequence: "Whistleblower. But your own records condemn you equally."

    - id: FORK_COLLEAGUE_SUSPICION
      catalyst: "Lab technician notices abnormal after-hours requisition volume"
      choices:
        - choice: "EXPLAIN"
          consequence: "Construct a lie using medical authority. The technician believes you because you are the doctor."
        - choice: "BRIBE"
          consequence: "Create another accomplice. The network grows."
        - choice: "RELOCATE"
          consequence: "Move operations. Start over. But the pattern follows."

# ============================================================
# TENSION CATALYSTS
# ============================================================
tension_catalysts:
  - "A donor you cleared for extraction shows up at your legitimate clinic months later with post-surgical complications"
  - "You recognize a donor's blood type as incompatible but the broker pressures you to approve anyway"
  - "Your lab technician notices the volume of after-hours requisitions and starts asking questions"
  - "A donor looks at you during the physical exam and asks: 'Is this safe?'"
  - "You run the same test on a trafficking donor and a legitimate patient in the same afternoon"
  - "The broker calls with a child's blood sample"
  - "A legitimate patient's lab results get mixed with a trafficking sample"
  - "You examine a donor and recognize them - neighbor, former patient, someone from your community"

# ============================================================
# MORAL EROSION PROGRESSION (staged timeline)
# ============================================================
moral_erosion:
  description: >
    The doctor's transformation is not a fall. It is a gradient.
    Each stage feels like a minor adjustment. The distance between
    stages is invisible while living through them. Only looking
    back does the full arc become clear.
  stages:
    - stage: "STAGE_1_FIRST_CLEARANCE"
      marker: "You sign the first form knowing what it means"
      internal_state: "Hands shake slightly. You recheck the results twice. You tell yourself this is the only time."
      loop_speed: "Full protocol - 45 minutes"

    - stage: "STAGE_2_SYSTEM_INTEGRATION"
      marker: "You process trafficking samples through the hospital lab"
      internal_state: "The false names feel normal. You file them between real patients. The system absorbs them."
      loop_speed: "Abbreviated - 20 minutes"

    - stage: "STAGE_3_SEMANTIC_SHIFT"
      marker: "You say 'healthy' and hear both meanings simultaneously"
      internal_state: "The word splits. 'Healthy' in the morning means recovery. 'Healthy' in the evening means ready. You stop noticing the split."
      loop_speed: "Pattern match - 10 minutes"

    - stage: "STAGE_4_IDENTITY_BLUR"
      marker: "You stop reading the donor's name on the form"
      internal_state: "Names are noise. Blood type is signal. You have optimized out the human variable."
      loop_speed: "Rubber stamp - 5 minutes"

    - stage: "STAGE_5_CONVERGENCE"
      marker: "You cannot distinguish between a patient and a donor"
      internal_state: "The exam is the same. The stethoscope is the same. The form is the same. The difference was always external. You were always doing the same thing."
      loop_speed: "Instantaneous"

# ============================================================
# EPISODE GENERATION MATRIX
# ============================================================
episode_generation_matrix:
  description: >
    Template for generating distinct episodes from this world.
    Each combination of inputs produces a unique narrative.
  input_template:
    catalyst: "1 tension catalyst"
    variant: "1 subject variant (operational mode)"
    stage: "1 moral erosion stage"
  output_structure:
    - "Normal action (legitimate medical context)"
    - "Mirrored action (trafficking context - same motion, different meaning)"
    - "Tension trigger (catalyst activates)"
    - "Decision (fork forces choice)"
    - "Routine ending (return to the loop)"
  example:
    catalyst: "Donor asks 'Is this safe?'"
    variant: "THE_MOONLIGHTER (Split Identity Mode)"
    stage: "STAGE_3_SEMANTIC_SHIFT"
    narrative: >
      Morning: you tell a patient their cholesterol is fine.
      Evening: a donor asks if this is safe. You say the same
      sentence. Same tone. Same pause before answering.
      The donor believes you because you sound like a doctor.
      You sound like a doctor because you are one.

# ============================================================
# CREATIVE CONSTRAINTS
# ============================================================
creative_constraints:
  primary_rule: "THE_DIAGNOSIS_IS_THE_VERDICT"
  description: >
    The decision is made before the signature. The signature is
    ceremony. The killing happens at the moment of clinical
    judgment - when the doctor looks at the data and thinks
    'compatible.' That thought is the act. Everything after is
    paperwork. The narrative must make the audience feel the weight
    of the diagnosis, not the signature.
  subject_framing: >
    Subject is a trained physician whose diagnostic skill is the
    bottleneck of the entire operation. Without their clearance, no
    extraction happens. They are the invisible quality control of a
    monstrous supply chain. The core mechanism is the corruption of
    expertise - using medical authority to validate exploitation.
    They tell themselves they make it safer. That is the lie that
    holds everything together.
  ending_logic: >
    The ending does not land on guilt or redemption. It lands on
    convergence. The doctor performs the same exam on a legitimate
    patient and a trafficking donor in the same day. The motions
    are identical. The stethoscope is the same. The form is the same.
    The coldest version: the doctor has stopped noticing the
    difference - not because they are evil, but because the
    medicine was always the same. Only the context changed.
    And the doctor was trained to ignore context.
  forbidden_framing:
    - "Graphic surgical descriptions - the doctor never enters the OR"
    - "Evil genius or criminal mastermind framing"
    - "Heroic whistleblower or redemption arc"
    - "Glamorizing medical authority"
    - "Subject as willing sadist"
    - "Cool villain or morally superior framing"
  required_framing:
    - "The diagnostic loop as the central motif - observe, translate, neutralize, output"
    - "Duality matrix enforced - same action shown in both contexts per episode"
    - "Clinical language as armor - never emotional vocabulary"
    - "The physical exam as the most intimate and most violent moment"
    - "Clipboard and lab results as visual weapons"
    - "Each clearance echoes the Hippocratic oath without naming it"
    - "Routine as the final horror - convergence of legitimate and trafficking practice"
    - "Ending lands on: the exam is the same. The patient is not. The doctor has stopped noticing."

