key_facts:
  - "5-10% of all organ transplants globally each year are illegal - roughly 5,000 to 12,000 illicit transplants annually"
  - "The illegal organ trade generates between $840 million and $1.7 billion in annual profits worldwide"
  - "Kidneys are the most trafficked organ because they can be taken from living donors and chronic kidney disease creates massive global demand"
  - "The broker is the most critical role in the network - connecting desperate sellers with wealthy buyers, managing logistics, documents, travel, and medical facilities"
  - "Recruiters target impoverished communities - promising large payments that are rarely delivered in full"
  - "Victims are told lies - that kidneys regenerate or that humans have three kidneys - to minimize perceived risk"
  - "Operations require corrupt medical professionals - surgeons, nurses, anesthesiologists - working in private clinics or compromised hospitals"
  - "Donors are typically abandoned after surgery without follow-up care - leading to lifelong health damage and inability to work"
  - "Wealthy patients from developed nations engage in transplant tourism - traveling to countries with weak oversight to bypass legal waiting lists"
  - "A single kidney can be bought from a desperate seller for $5,000 and sold to a wealthy recipient for $150,000 or more"

