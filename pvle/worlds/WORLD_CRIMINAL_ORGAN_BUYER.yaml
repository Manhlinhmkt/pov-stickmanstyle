# CREATIVE CONSTRAINTS (episode-level enforcement)
creative_constraints:
  primary_rule: "NEVER_SEE_THE_DONOR"
  description: >
    The buyer's horror is the void of knowledge. You never meet the
    donor. You never see the extraction. You only see your own
    survival - and the questions you train yourself not to ask.
    The narrative lives in willful blindness and the slow collapse
    of self-justification.
  subject_framing: >
    Subject is not a villain - they are a dying person who chose
    survival over ethics. The core mechanism is the corruption of
    desperation - how ordinary moral people become complicit in
    monstrous systems when their own life is at stake.
  forbidden_framing:
    - "Subject as willing criminal or thrill-seeker"
    - "Graphic surgical descriptions from the buyer's POV"
    - "Dehumanizing the donor or treating them as disposable"
    - "Framing the purchase as a smart decision"
  required_framing:
    - "Desperation as gateway to complicity"
    - "The question you never ask as recurring motif"
    - "Physical intimacy with a stranger's organ inside you"
    - "Cover story maintenance as daily psychological burden"
    - "Ending lands on the impossibility of undoing what was done"

