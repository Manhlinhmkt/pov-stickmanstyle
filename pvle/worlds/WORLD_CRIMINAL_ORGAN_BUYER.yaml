key_facts:
  - "Organ waiting lists in developed countries average 3-5 years - during which 17 people die every day in the US alone waiting for a transplant"
  - "Transplant tourism packages cost $100,000-$200,000 - including travel, surgery, recovery, and documentation laundering"
  - "Buyers typically receive a single phone call with a date and destination - they are told nothing about the donor"
  - "Many buyers are ordinary people - teachers, engineers, parents - who were told they would die without a transplant within months"
  - "Post-transplant, buyers must take immunosuppressant drugs for life - a daily reminder of how the organ was obtained"
  - "Brokers coach buyers to tell their home doctors the transplant happened through a generous family member abroad"
  - "Some buyers discover later that their donor was a kidnapping victim or a prisoner - by then the organ is already inside them"
  - "The Declaration of Istanbul (2008) explicitly condemns transplant tourism but enforcement remains weak across most participating nations"
  - "Repeat buyers exist - liver segments, corneas, bone marrow - once you enter the network, they know you will pay"
  - "A single kidney costs the buyer $100,000-$200,000 - while the donor receives $5,000 or less, often nothing"
  - "Buyers are tracked and re-contacted by the network for future procedures - returning clients receive faster access and reduced moral resistance"

