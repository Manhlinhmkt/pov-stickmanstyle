# =============================================================================
# THEMATIC COUNTERPOINT (series-level coherence)
# =============================================================================

thematic_counterpoint:
  note: >
    This world is the mirror image of every power-perspective
    Iran episode. PV_0009 decided to bomb. PV_0004 decided
    to retaliate. PV_0018 ran the assets. PV_0011 pressed the
    button. This person is on the other end of all of those
    decisions. The coordinates. The dual-use building. The
    neighborhood under pattern-of-life surveillance.
    Every other episode says "you made the call."
    This episode says "you were standing where it landed."
  triangulation:
    PV_0011_DRONE: "control - you press the button"
    PV_0012_MOSSAD: "manipulation - you run the lie"
    PV_0018_CIA: "proxy power - you trade lives at a distance"
    PV_0019_CIVILIAN: "zero agency - you are the coordinate"

# =============================================================================
# PLATFORM SAFETY
# =============================================================================

platform_safety:
  framing: "Fictionalized composite - civilian perspective during wartime escalation"
  focus: "Survival psychology > political commentary. Human cost > military analysis."
  forbidden:
    - Graphic depictions of casualties or gore
    - Specific real regime leaders by name
    - Pro-regime or anti-regime political stance
    - Glorification of any military force
    - Specific real attack targets or classified details
    - Portraying civilian as politically motivated
  allowed:
    - Economic impact of sanctions on daily life
    - Emotional weight of displacement and uncertainty
    - Family dynamics under extreme pressure
    - Information blackout as psychological weapon
    - The gap between strategic language and lived reality
    - Moral micro-choices under survival pressure
    - Dual oppression (external bombing + internal control)
  note: >
    The civilian is not pro-regime or anti-regime. They are pro-survival.
    The regime is not the hero saving them. The regime is also compressing them.
    Both forces are presented without political editorializing.
    Key frame: psychological portrait of being trapped between two powers.

