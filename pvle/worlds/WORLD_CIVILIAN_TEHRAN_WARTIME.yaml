    name: "The Apartment"
    description: >
      Mid-floor unit in west Tehran. Daughter's cat drawing on
      the fridge. Glass of water on the kitchen counter that shakes
      when the strikes are close. After: crack running ceiling
      to floor, right through the drawing.

  - id: LOC_BASEMENT_SHELTER
    name: "The Parking Garage"
    description: >
      Underground level. Twelve families on concrete. One battery
      radio. Bread passed between strangers. A plastic bag that
      tore on the stairs. A water bottle under a parked car.

  - id: LOC_BREAD_QUEUE
    name: "The Bakery Queue"
    description: >
      A line starting before dawn. Faces lit by phone screens.
      Dissolves without spectacle when the flour runs out.
      No footage exists of people walking home with empty bags.

  - id: LOC_PHARMACY
    name: "The Pharmacy"
    description: >
      One box of insulin left on the shelf. Two fathers. One
      pharmacist who says nothing. The place where survival
      and morality split.

  - id: LOC_METRO_STATION
    name: "Tehran Metro - Tajrish to Mirdamad"
    description: >
      Daily commute. Where you argue about football scores.
      After: the nearest station closed for structural damage.
      The ordinary infrastructure of a life that stopped being ordinary.

  - id: LOC_VALIASR_STREET
    name: "Valiasr Street"
    description: >
      The longest street in Tehran. The saffron ice cream shop.
      Friday walks. After: the shop is closed, the owner left,
      the street is the same but nothing on it is.

