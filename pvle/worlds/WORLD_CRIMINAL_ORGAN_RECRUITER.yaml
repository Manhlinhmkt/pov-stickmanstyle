# ============================================================
# TENSION CATALYSTS
# ============================================================
tension_catalysts:
  - "The broker teaches you the sentence and you practice it alone until it stops sounding like a lie"
  - "Someone you recruited comes back and cannot look at you - but they still bring someone else"
  - "Your own scar itches when you say the words"
  - "You recruit someone younger than you were when you sold - and you use the exact words that worked on you"
  - "The broker raises your quota and you already know where to find them"
  - "You catch yourself using the sentence pattern with your own family - not for recruitment, just to get what you need"
  - "You realize you are better at this than the man who recruited you - and it does not bother you anymore"
  - "Someone says no. You feel nothing. You know the math. They will come back."

# ============================================================
# IRREVERSIBLE MARKERS
# ============================================================
irreversible_markers:
  - "You say the sentence to someone who trusts you for the first time"
  - "You put someone on the bus and watch it leave"
  - "You collect the envelope and count it in front of the broker"
  - "You change one word in the sentence. It works better."
  - "Someone you recruited recruits someone else"
  - "You hear yourself say it - and it sounds exactly like him"

# ============================================================
# IDENTITY EROSION (unique to this world)
# ============================================================
identity_erosion:
  description: >
    The recruiter does not lose their body like the donor. They lose the
    boundary between themselves and the system. The sentence pattern
    infects their language. They begin using it everywhere - negotiating
    with a landlord, calming a child, lying to a spouse. They do not
    notice the shift. By the time they realize, the pattern IS how they
    speak. The horror is not that they learned the sentence. The horror
    is they cannot unlearn it.
  stages:
    - stage: "INHERITED"
      marker: "Someone said the sentence to you. You remember every word."
    - stage: "LEARNING"
      marker: "Practicing the sentence alone, adjusting words, rehearsing tone"
    - stage: "PERFORMING"
      marker: "Delivering the sentence to targets, refining through repetition"
    - stage: "IMPROVING"
      marker: "Changing words, finding what works better - no longer copying, now evolving the system"
    - stage: "MERGING"
      marker: "Using the pattern outside recruitment without noticing - with family, with yourself"
    - stage: "DISSOLVED"
      marker: "Cannot distinguish between the script and your own voice. The sentence is how you think."

# ============================================================
# CREATIVE CONSTRAINTS
# ============================================================
creative_constraints:
  primary_rule: "THE_SENTENCE_IS_THE_WEAPON"
  description: >
    The narrative lives inside language - the words that convert a person
    into a product. The horror is not violence but persuasion. The
    recruiter carries two wounds: the scar on their body and the script
    in their mouth. Every recruitment is a reenactment of their own
    exploitation - but from the other side of the table. The surgery is
    never shown. The sentence is.
  subject_framing: >
    Subject is both victim and perpetrator simultaneously. They were made
    by the same system they now serve. The core mechanism is corrupted
    empathy - using genuine understanding of desperation as a recruitment
    tool. The body that was sold now sells others. The transition from
    victim to competent perpetrator is gradual - and the most dangerous
    moment is when the recruiter feels pride instead of guilt.
  ending_logic: >
    The ending does not land on guilt, regret, or redemption. It lands
    on competence without belief. The recruiter does not need to believe
    the sentence anymore. They just need the other person to believe it.
    The coldest version: "You don't know if it's true anymore.
    You just know it works."
  forbidden_framing:
    - "Cool manipulator or con artist framing"
    - "Pure villain without humanity"
    - "Redemption arc or heroic whistleblower ending"
    - "Graphic surgical descriptions"
    - "Poverty porn or pity without complexity"
  required_framing:
    - "The sentence pattern as the central motif - repeated, evolving, degrading"
    - "The scar as physical proof and recruitment tool"
    - "Moral corruption shown as gradual erosion not sudden choice"
    - "Each recruitment echoes the recruiter's own experience"
    - "Identity erosion visible through language contamination"
    - "Competence as the final horror - pride replacing guilt"
    - "Ending lands on: you don't need to believe it. They do."

# ============================================================
# MICRO-BEHAVIORS (POV texture layer)
# ============================================================
micro_behaviors:
  description: >
    Small, specific actions that make the recruiter feel real in POV.
    These are not dramatic. They are the mundane mechanics of
    manipulation - the things that happen between the words.
  behaviors:
    - "You pause before saying the number. That pause matters more than the number."
    - "You let them say yes to themselves. You just stay quiet."
    - "You never push. You wait."
    - "You pour the second cup of tea before they ask."
    - "You look away when they start to cry. Not out of shame. Out of patience."
    - "You count the seconds after you finish talking. If they speak first, it worked."

# ============================================================
# FAILURE MECHANICS (psychological realism)
# ============================================================
failure_mechanics:
  description: >
    Not every target says yes immediately. The recruiter knows this.
    The recruiter was a no once too. The power is not in persuasion
    but in patience - knowing that desperation has a timeline and
    the answer always changes.
  pattern:
    - "Someone says no. You nod. You leave."
    - "You don't follow up. You don't need to."
    - "They come back three days later. Sometimes a week."
    - "You know they will come back because you came back too."
    - "Everyone says no the first time. That is part of saying yes."

