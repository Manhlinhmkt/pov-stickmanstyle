# ============================================================
# CORE MECHANIC (narrative engine for this world)
# ============================================================
core_mechanic:
  name: "THE_SENTENCE_PATTERN"
  description: >
    The recruiter never names what is being sold. The sentence always
    reframes reality: reduce the problem to something urgent and
    temporary, present the solution as small and reasonable, and anchor
    it in proof the target can see with their own eyes. The power is not
    in lying. The power is in making the truth bend toward yes.
  verbal_pattern:
    structure: "problem_reduction -> relief_framing -> normalization"
    signature_sentences:
      - "This solves the part that is killing you right now."
      - "It is the part your body can afford to lose."
      - "You already know people who did it. They are still here."
      - "You won't miss it. Not in the way you think."
    support_sentences:
      - "You just need enough to get through this month."
      - "It is only one time. Then it is over."
      - "People come back fine. You have seen it yourself."
  physical_proof:
    description: >
      The sentence is incomplete without the body. The recruiter lifts
      their shirt, shows the scar, and says: look, I am fine. This is
      the thing no broker can do. The scar is proof of survival - and
      the most effective lie the recruiter tells, because it is also true.
    signature_gesture: "lifting the shirt to show the scar"
  sentence_evolution:
    description: >
      The sentence degrades as the recruiter becomes more skilled. What
      begins as a full rehearsed pitch becomes instinct. The fewer words
      used, the more dangerous the recruiter has become.
    stages:
      - stage: "STAGE_0_INHERITED"
        example: "Someone said it to you first. You remember the exact words."
        note: "The sentence existed before the recruiter. They inherited it from the person who recruited them."
      - stage: "STAGE_1_FULL"
        example: "This solves the part that is killing you right now. It is only one time. Look - I am fine."
        note: "Full rehearsed pitch. Still feels like acting."
      - stage: "STAGE_2_SHORTENED"
        example: "It solves the part that is killing you. One time."
        note: "Confidence strips away the padding."
      - stage: "STAGE_3_FRAGMENT"
        example: "Just enough."
        note: "Language becoming instinct."
      - stage: "STAGE_4_SILENCE"
        example: "How much do you need?"
        note: "The sentence is no longer needed. The recruiter has become the sentence."

# ============================================================
# KEY FACTS (behavior-first, POV-ready)
# ============================================================
key_facts:
  # --- Observable behavior (VO-ready) ---
  - "You don't go to the ones who still have options. You wait until they stop arguing with themselves."
  - "You lift your shirt and say: look, I am fine. They look at the scar. They stop asking questions."
  - "You never say 'sell' or 'organ.' You say 'help.' You say 'opportunity.' You say 'just this once.'"
  - "You never push. You wait. You let them say yes to themselves. You just stay quiet."
  - "You pause before saying the number. That pause matters more than the number itself."
  - "Someone says no. You don't try again. You wait. They come back three days later. Everyone comes back. You know this because you came back too."
  - "You practice the sentence alone before you say it to someone. You adjust one word. It works better."
  - "You target people you know - neighbors, relatives, the ones who trust you - because trust is the only thing that works at the bottom of the chain"
  - "You earn $500-$1,000 per referral - a fraction of the broker's cut, but steady income for a body that can no longer do heavy labor"
  - "In kidney villages, you are both respected for having connections and avoided for what those connections mean"

  # --- System context (writer reference) ---
  - "Former sellers are recruited as recruiters specifically because they carry the scar - living proof that the procedure is survivable"
  - "Recruiters who bring in consistent referrals are promoted to sub-broker status - given a phone, a territory, and a quota"
  - "After enough repetitions, recruiters stop remembering which parts of the sentence are true and which parts they added to make it work"
  - "The line between the recruiter's own story and the recruitment script dissolves over time - they begin using the same persuasion patterns outside of work, with family, with themselves"

