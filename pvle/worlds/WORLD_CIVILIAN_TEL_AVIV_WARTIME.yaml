# =============================================================================
# SOMATIC LAYER (body experience for Phase 2 VO)
# Every POV moment must pass through the body first
# =============================================================================

somatic_layer:
  description: >
    The viewer should FEEL before they UNDERSTAND. Every key moment
    encodes a physical sensation. This is what separates POV from
    documentary. The war lives in the body before it lives in the brain.
  instances:
    feet:
      - "Cold tile at 4:17 AM - you don't feel your feet until the hallway"
      - "Feet know the path to mamad in the dark - 7 seconds"
      - "Feet move toward hallway at car door slam - months after ceasefire"
    hands:
      - "Hand slips on mamad door handle - metal warm from your grip"
      - "Hand wraps around warm coffee cup - the only warmth that feels normal"
      - "Hand on son's back - counting his breaths"
      - "Forehead pressed against bathroom mirror - breathing"
    chest:
      - "Heart in your throat - you can hear it, wonder if your son can"
      - "Chest tightens at interception flash"
      - "Chest tightens at car door slam after ceasefire"
      - "Son's warm breathing on your neck in the mamad"
    ears:
      - "Pressure drop after Iron Dome interception - ears pop"
      - "Crack overhead = good. Floor shift = bad. You learned this by sound"
      - "Ears ring after the one that gets through"
      - "Car alarm that starts screaming and does not stop"
    smell:
      - "Sulfur seeping through window seal after interception"
      - "Son's shampoo in the mamad at 2 AM"
      - "Something burning outside during phone call with sister"

