# =============================================================================
# THEMATIC COUNTERPOINT (MIRROR EPISODE ARCHITECTURE)
# =============================================================================

thematic_counterpoint:
  note: >
    This world is the mirror image of PV_0019 (Tehran Civilian).
    Same war. Same sky. Different coordinates.
    Tehran counts water bottles. Tel Aviv counts interceptions.
    Tehran has no dome. Tel Aviv has 90 seconds.
    Tehran's motif is THE MATH. Tel Aviv's motif is THE COUNTDOWN.
    Both are compulsive arithmetic as coping mechanism.
    Both end the same way: alive, but not recovered.
    "You survived" is not the same as "you are okay."
  mirror_structure:
    shared_pattern:
      - "Ordinary life before (specific, micro-detailed)"
      - "First signal (not the bomb - the infrastructure failing)"
      - "The body learning war"
      - "Someone specific taken by the war"
      - "The world watching but not seeing you"
      - "The moral fracture (what survival costs)"
      - "The child's question that breaks you"
      - "The after that is not recovery"
    motif_parallel:
      PV_0019_TEHRAN: "THE MATH - counting as coping"
      PV_0020_TEL_AVIV: "THE COUNTDOWN - 90 seconds as body clock"
    ending_parallel:
      PV_0019: "You are alive. Everyone says that should be enough. It is not."
      PV_0020: "The sirens stopped. Your body didn't."
  triangulation:
    PV_0009_TRUMP: "decided the escalation"
    PV_0004_NETANYAHU: "authorized the response"
    PV_0011_DRONE: "pressed the button"
    PV_0019_TEHRAN_CIVILIAN: "stood where it landed (other side)"
    PV_0020_TEL_AVIV_CIVILIAN: "waited for the siren (this side)"

# =============================================================================
# PLATFORM SAFETY
# =============================================================================

platform_safety:
  framing: "Fictionalized composite - civilian perspective during wartime escalation"
  focus: "Survival psychology > political commentary. Somatic experience > military analysis."
  forbidden:
    - Graphic depictions of casualties or gore
    - Specific real political leaders by name
    - Pro-war or anti-war political stance
