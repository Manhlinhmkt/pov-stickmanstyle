# =============================================================================
# SUBJECT ARCHETYPE
# Mid-30s professional in Tel Aviv - secular, modern, exhausted
# Not a soldier, not a settler - just a person trying to live
# =============================================================================

subject_archetype:
  role: "UX designer at a Tel Aviv startup - mid-30s, married, one son (6)"
  behavioral_details:
    - "Takes the train from Holon to HaShalom station every morning"
    - "Son leaves LEGO pieces on the living room floor every night"
    - "Keeps a go-bag by the front door - water, documents, phone charger"
    - "Checks the Red Alert app before checking the weather"
    - "Argues with coworkers about Maccabi Tel Aviv match results"
    - "Buys his wife rugelach from a specific bakery on Dizengoff"
    - "Has a shelter room - the mamad - but the door sticks"
    - "Sleeps in boxers and a t-shirt - the clothes he will run in"
  motivation: "SURVIVAL + NORMALCY - wants son to grow up without flinching"
  narrative_function: >
    The subject is not political. They did not choose to live in a country
    at war. They did not vote for the escalation. They are the person
    under the dome. When the missile launches from 1,200 kilometers away,
    this person has 90 seconds. When the news shows an interception,
    this person smells the sulfur and feels the pressure drop in their
    ears. When the world debates proportionality, this person is teaching
    their son that the loud crack overhead is the "good boom."
    Their body learned the war before their brain did.

# =============================================================================
# RECURRING MOTIF: 90 SECONDS (THE COUNTDOWN)
# The psychology of survival expressed as a countdown
# NOT just a number - this is a BODY CLOCK that rewires the nervous system
# Phase 2 (VO) should thread this through the entire script
# =============================================================================

recurring_motif:
  name: "THE COUNTDOWN"
  description: >
    Survival reduces to a single number: 90. Seconds between siren
    and impact. The body learns this before the brain does.
    It starts as panic - raw, animal, graceless.
    Then it becomes routine - efficient, automatic, numb.
    Then the routine IS the wound.
    By the end, 90 seconds is how long everything takes.
    Getting coffee. Saying goodnight. Checking the sky.
    The countdown never stops. It just stops being about rockets.
  instances:
    - "90 seconds to the mamad - your feet know the path before you do"
    - "Son counts to 90 in bed - he thinks it is a game"
    - "3 cracks overhead - Iron Dome. You count the gaps between them"
    - "7 seconds from siren to son's bedroom door - you have shaved 2 seconds off"
    - "4:17 AM - the siren. Carry him. Bare feet on cold tile"
    - "12 interceptions visible from the balcony - white streaks on black"
    - "4 hours in the mamad. LEGO tower reaches 23 blocks"
    - "News says 200 in one night. You felt 3. The math doesn't comfort you"
    - "One got through. Your ears tell you before the news does"
    - "After ceasefire: you still count to 90 in the shower"
  resolution_echo: >
    "The sirens stopped. Your body didn't."

# =============================================================================
# COUNTDOWN STRUCTURE (narrative architecture for Phase 2)
# This rhythm REPEATS through the episode with escalating emotional weight
# =============================================================================

countdown_structure:
  description: >
    The episode uses the 90-second countdown as a recurring rhythm.
    Each cycle has a different emotional charge. The viewer's body
    learns the pattern - and that learning IS the point.
  cycles:
    cycle_1_PANIC:
      phase: PHASE_CONFLICT_EARLY
      emotional_weight: "raw fear - first time"
      body_state: "hands shake, feet cold, child heavy"
      duration_feel: "90 seconds feels like 900"
      outcome: "interception - safe - but shaking for an hour after"

    cycle_2_ROUTINE:
      phase: PHASE_CONFLICT_MID
      emotional_weight: "numb efficiency - body automates"
      body_state: "feet know the path, hands find the door, no thinking"
      duration_feel: "90 seconds feels like 30"
      outcome: "interception - safe - back to coffee"

    cycle_3_THE_ONE_THAT_GETS_THROUGH:
      phase: PHASE_CRISIS
      emotional_weight: "the routine fails - something breaks"
      body_state: "different sound. building shakes. ears ring. floor moves"
      duration_feel: "90 seconds never ends"
      outcome: "impact nearby - the dome is 90%, not 100%"

    cycle_4_PHANTOM:
      phase: PHASE_RESOLUTION
      emotional_weight: "no siren - but body still counts"
      body_state: "heart spikes at car horn, flinch at door slam"
      duration_feel: "90 seconds is now the length of everything"
      outcome: "the countdown outlives the war"

# =============================================================================
# KEY FACTS - v2.0: added somatic layer, kinetic rewriting,
#   countdown structure integration, sharpened iron dome paradox,
#   upgraded moral fracture, stronger before/after callbacks
# =============================================================================

key_facts:
  # --- WHO YOU ARE ---
  1: >
    You are a UX designer at a startup in Tel Aviv. You design
    interfaces for an app that helps restaurants manage delivery
    orders. You are good at your job. Your job exists in a country
    where the delivery driver checks the shelter map before every
    route. You did not choose this. You just design buttons inside it.
    Every morning you argue about basketball scores on the train.
    Every Friday you bring rugelach home from Dizengoff. Your son
    leaves LEGO pieces on the floor and you step on them barefoot
    at 2 AM and swear quietly. You are ordinary. That is the point.
    (HOOK / PHASE_EARLY: ordinary life inside extraordinary constraints)

  # --- THE CITY BEFORE ---
  2: >
    Before the escalation, Tel Aviv is 460,000 people complaining
    about rent on Rothschild Boulevard. Students drink iced coffee
    outside the campus on Ibn Gabirol. Couples walk the promenade
    at sunset and the Mediterranean does not care about borders.
    Your coworker is angry because Maccabi lost again. The barista
    at your corner cafe draws a smiley face on your cup. The conflict
    is background noise - present, yes, but containable. The Iron Dome
    works. The sirens come and go. You have learned to keep living
    between them. Your son was born into this. He thinks sirens
    are weather. Most people do.
    You will not understand what this city was until it stops being this.
    (PHASE_EARLY: the city is real - every detail is future loss)

  # --- THE NORMALIZATION CRACK (spike 1) ---
  3: >
    It starts not with a siren but with frequency. Monday: two alerts.
    Tuesday: five. Wednesday: eleven before noon. Your phone buzzes
    so often your son thinks it is a game. "Daddy's phone is singing
    again." By Thursday your thumb swipes the alert before your brain
    reads it. By Friday the school closes. The app you designed to
    manage delivery orders goes quiet - restaurants closed, drivers
    home. The frequency is the weapon. Not the rockets. The fact
    that your nervous system cannot reset between them.
    You learn the difference between "interception" and "impact"
    by the sound. One is a crack overhead. The other moves the floor.
    (PHASE_EARLY / CONFLICT: normalization shattering - frequency as weapon)

  # --- THE FIRST COUNTDOWN (cycle 1 - PANIC) ---
  4: >
    4:17 AM. The siren. Your body is up before your brain.
    The floor is cold under your bare feet. You do not feel them
    until you hit the hallway. Your son is heavy and warm and still
    half-asleep on your shoulder. Your wife has the go-bag.
    The mamad door sticks - you pull, lift, yank - your hand
    slips on the metal and you feel a sting but you do not look.
    Inside. Door closed. Concrete walls. Your son's LEGO set is
    already in here because you moved it three days ago without
    thinking about why. Your heart is in your throat. You can hear
    it. You wonder if your son can hear it. He is six. He counts
    to 90 because you told him to once and he never stopped.
    Three cracks overhead. Iron Dome. The pressure drops in your
    ears. Sulfur smell seeps through the window seal. You are safe.
    You are shaking. You will shake for another hour.
    (PHASE_CONFLICT: first countdown - the body learns war before the brain)

  # --- THE IRON DOME PARADOX ---
  5: >
    The Iron Dome catches 90%. You see the interceptions from your
    balcony - white streaks crossing in the sky like angry fireflies.
    Your son watches with you. He says "cool." You say nothing.
    90% means 10% get through. In a barrage of 200, that is 20
    impacts somewhere in the country. You do not know where until
    you hear it or you do not hear it. The dome is a ceiling, not
    a wall. It keeps most of the rain out. You still get wet.
    The sky protects you. That is what they say. You stand on the
    balcony and watch it work in percentages. When an interception
    flashes, your ears pop and the sulfur hits your nostrils and
    your son claps and your chest tightens because you are watching
    your survival calculated in real time above your head.
    When the world says "Israel has Iron Dome" they mean: relax.
    You do not relax. You feel 90%. 90% is not safe. 90% is math
    that waits for the wrong night.
    (PHASE_CONFLICT: protection that is not protection - the paradox lived in the body)

  # --- THE SECOND COUNTDOWN (cycle 2 - ROUTINE) ---
  6: >
    By day seven, your body runs the countdown without you.
    Siren. Feet on floor. Son on shoulder. Hallway. Door. Pull,
    lift, yank. Inside. Ninety seconds. You do not shake anymore.
    You do not think. Your feet know the path. Your hands find the
    door handle in the dark. Your wife does not wake your son -
    she carries him asleep and he does not stir. He has learned
    to sleep through the pickup. That detail destroys you more
    than any explosion. Your six-year-old's body has adapted
    to being carried to safety in the dark. This is what
    resilience looks like from outside. From inside, it is the
    moment you realize your son's nervous system has been rewritten.
    (PHASE_CONFLICT: routine as wound - the body automates trauma)

  # --- THE RESERVIST CALL ---
  7: >
    Your neighbor gets the call on Tuesday. Miluim. Reserve duty.
    He packs a bag, kisses his daughter at the door, and drives
    north. His wife stands in the hallway after he is gone, holding
    the daughter, not moving. Her jaw is set but her hands are
    shaking. You bring them dinner. His daughter plays LEGO with
    your son in the mamad during the next siren. She builds a house.
    Your son builds a dome over it. Two weeks later, his wife stops
    answering messages. You do not ask why. On the news, they
    announce casualties without names. You watch every broadcast.
    You count the names that are not his. That is how you hope
    now - by subtraction.
    (PHASE_CONFLICT: the war takes someone specific - proximity to loss)

  # --- THE WORLD IS WATCHING (but not you) ---
  8: >
    Your sister in New York calls. She is crying. People at her
    office are arguing about the war. She does not know what to say
    when they ask her to "condemn." She asks you what to say.
    You are standing in the mamad at 2 AM. Your son is asleep on
    your chest. His breathing is warm on your neck. You can smell
    his shampoo. Outside, something is burning. You say: "I do not
    know what to say either." The world has an opinion about your
    country. You do not have a country right now. You have a mamad
    and 90 seconds and a boy who weighs 22 kilos on your chest.
    The phone cuts. You hold him tighter. You are not a headline.
    You are not a position. You are a father in a concrete room,
    and the concrete is the only thing between his sleep and the sky.
    (PHASE_CONFLICT / CRISIS: the gap between discourse and lived experience)

  # --- THE ONE THAT GETS THROUGH (cycle 3 - CRISIS) ---
  9: >
    One gets through. You hear the difference instantly.
    Interception is a crack above. Impact is a sound that moves
    through your skeleton. The floor shifts. Not shakes - shifts,
    like the building exhaled. Your ears ring. A car alarm starts
    screaming outside and does not stop. 800 meters from your
    son's school. The school is closed - it has been for a week.
    But you drive past the crater on the way to the supermarket.
    The playground fence is twisted. A swing set is on its side.
    A backpack is hanging on the fence. Nobody's. Everyone's.
    Your son sees it from the car window. He does not say anything.
    That night he does not ask to sleep in the mamad. He just walks
    in and lies down on the blanket. He does not count to 90.
    He does not count at all. That is worse.
    (PHASE_CRISIS: the one that gets through - the body knows before the brain)

  # --- THE MORAL FRACTURE ---
  10: >
    The news shows footage. You watch because you cannot not watch.
    Buildings that look like yours. Rubble that used to be
    someone's mamad. Children pulled from concrete, covered in
    dust, screaming. Children who look like your son.
    You are relieved it is not your building.
    You hate yourself for that.
    You do not stop feeling relieved.
    Your wife says turn it off. You do not turn it off. You are
    trying to locate what you feel but the feelings arrive in the
    wrong order: relief, guilt, anger at the guilt, grief for
    people you do not know, fear that caring makes you disloyal
    to the people who are protecting you. The feelings do not
    resolve. They stack. You turn it off. You do not sleep.
    Nobody in your building talks about it. The silence has weight.
    You can feel it in the elevator. Eye contact without words.
    Everyone carrying the same stack. Nobody unpacking it.
    (PHASE_CRISIS: moral fracture - what you allow yourself to feel)

  # --- THE NORMALIZATION (routine as wound) ---
  11: >
    After 10 days of sirens, you go back to the cafe. The barista
    is wearing the same apron but something behind her eyes has
    shifted. You order the same coffee. Sit in the same chair.
    Your hand wraps around the warm cup. A siren goes off.
    You pick up the cup. She picks up her phone. Everyone walks
    to the shelter. Not running. Walking. After the all-clear,
    everyone walks back. You finish your coffee. It is still warm.
    You drink it like nothing happened because if you do not drink
    it like nothing happened, you will put the cup down and
    scream. This is resilience from the outside. From inside,
    it is a crack that you covered with the next sip.
    (PHASE_CRISIS / RESOLUTION: normalization as both strength and wound)

  # --- THE SON'S QUESTION ---
  12: >
    Your son asks: "Are the booms the good ones or the bad ones?"
    You open your mouth. Nothing comes out. He is six. He has
    created a taxonomy: good boom = interception, bad boom = impact.
    He learned this in two weeks. He is correct. There are good
    booms and bad booms. You say: "The good ones." He nods and
    goes back to his LEGO. He is building something new. You ask
    what it is. He says: "A dome." He places a tiny figure inside.
    "That's you, Daddy." The figure is safe under the dome.
    The dome is made of plastic. The figure is smiling.
    You go to the bathroom and close the door and press your
    forehead against the mirror and breathe.
    (PHASE_CRISIS / RESOLUTION: innocence meets warfare - visceral)

  # --- THE AFTER ---
  13: >
    When the ceasefire comes - if it comes - nothing returns.
    The playground is repaired but your son will not go on the
    swings. The cafe is open but the barista moved to Berlin.
    Your neighbor came back from miluim but he does not talk.
    He smokes on the balcony at 3 AM. You see his cigarette
    glow from yours. Neither of you waves. Your wife still keeps
    the go-bag by the door. She sleeps with her hand on it.
    The LEGO dome is on the shelf in the mamad. The tiny figure
    is still inside, still smiling. Your son still counts to 90
    before he sleeps. You stopped counting. That is how you know
    something broke. A car door slams on the street below and
    your chest tightens and your feet move toward the hallway
    before your brain says stop.
    The sirens stopped. Your body didn't.
    You are alive. The dome held. Everyone says that should
    be enough. It is not.
    (PHASE_RESOLUTION: survival is not recovery - somatic memory outlives the war)

# =============================================================================
# IRREVERSIBLE MARKERS (5 points of no return)
# =============================================================================

irreversible_markers:
  marker_1:
    phase: PHASE_CONFLICT
    description: >
      Frequency breaks normalization. The phone stops being
      a phone and becomes a siren extension. The school closes.
      The app you built goes quiet.
    label: "NORMALIZATION_SHATTER"

  marker_2:
    phase: PHASE_CONFLICT
    description: >
      Your son's body adapts to being carried to safety in
      the dark without waking. His nervous system has been
      rewritten. You cannot un-teach this.
    label: "BODY_REWRITE"

  marker_3:
    phase: PHASE_CONFLICT
    description: >
      Neighbor leaves for miluim. His wife stops answering.
      You count names on the news by subtraction.
      The war takes someone specific.
    label: "PERSONAL_COST"

  marker_4:
    phase: PHASE_CRISIS
    description: >
      One gets through. The floor shifts. The swing set is
      on its side. Your son stops counting to 90.
      That is worse.
    label: "PROXIMITY_IMPACT"

  marker_5:
    phase: PHASE_CRISIS
    description: >
      You are relieved it is not your building.
      You hate yourself for that.
      You do not stop feeling relieved.
    label: "MORAL_FRACTURE"

