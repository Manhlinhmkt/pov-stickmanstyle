# KEY LOCATIONS
# =============================================================================

key_locations:
  - id: LOC_APARTMENT_TEL_AVIV
    name: "The Apartment"
    description: >
      Mid-floor unit in south Tel Aviv / Holon border. LEGO pieces
      on the living room floor. Go-bag by the front door. Balcony
      where you watch Iron Dome interceptions - white streaks,
      sulfur smell, ear pressure. After: go-bag stays by door.
      Wife sleeps with hand on it. Your feet still move to the
      hallway when car doors slam.

  - id: LOC_MAMAD
    name: "The Mamad (Safe Room)"
    description: >
      8 square meters of reinforced concrete. Door sticks - pull,
      lift, yank. LEGO set, water bottles, flashlight. Where the
      family lives between sirens. The LEGO tower that falls and
      rebuilds. 23 blocks. After: the LEGO dome on the shelf.
      Tiny figure inside, still smiling.

  - id: LOC_CAFE_DIZENGOFF
    name: "The Cafe on Dizengoff"
    description: >
      Corner cafe where you order the same coffee. Barista draws
      smiley faces. During escalation: siren goes off, everyone
      walks to shelter with their cups, walks back, finishes.
      Warm cup. Normal sip. The crack covered by the next sip.
      After: barista moved to Berlin.

  - id: LOC_SCHOOL_PLAYGROUND
    name: "The School Playground"
    description: >
      800 meters from impact. Twisted fence. Swing set on its side.
      A backpack hanging on the fence - nobody's, everyone's.
      Closed before the strike but the crater is visible from
      the car. After: repaired. Son will not go on the swings.

  - id: LOC_PROMENADE
    name: "Tel Aviv Promenade"
    description: >
      Sunset walks before. The Mediterranean that does not care
      about sirens. After: the same view but you check the app
      before you walk. The beauty feels wrong.

  - id: LOC_TRAIN_STATION
    name: "HaShalom Station"
    description: >
      Daily commute from Holon. Basketball score arguments.
      After: the train runs but the car is half-empty. Everyone
      sits near the doors.

