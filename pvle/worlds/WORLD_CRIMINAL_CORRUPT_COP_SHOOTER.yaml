# ============================================================
# FAILURE MECHANICS
# ============================================================
failure_mechanics:
  description: >
    The system occasionally cracks - a bystander phone, a camera
    that worked, a medical examiner who writes what they found.
    But the real horror: even when the system cracks, it heals
    itself. The investigation opens and closes. The name stays
    unreleased. The five words still work.
  pattern:
    - "A bystander phone captures the full sequence. Your commands. Their compliance. Your shots. The video goes viral before the report is finished."
    - "The body camera worked this time. IT has the footage. Your union rep says: say nothing."
    - "The medical examiner's report contradicts your account. Entry angle. Distance. Sequence. It does not matter. The five words still work."
    - "A federal pattern-or-practice investigation opens. Your precinct. Your unit. Your name is in the data. The investigation takes three years. You are still on the street."

related_worlds:
  - WORLD_CRIMINAL_CORRUPT_COP
series_note: >
  Second episode in the corrupt cop series. While PV_0025 explored
  evidence fabrication (THE_MANUFACTURED_CASE), this episode
  explores lethal force as progressive addiction (THE_CALCULATED_SHOT).
  Connecting thread: both cops operate inside a system designed
  to never ask. PV_0025's signature "You don't find evidence. You
  place it" becomes PV_0026's "I feared for my life" - both are
  phrases that create a reality the system accepts without checking.
  The difference: PV_0025 is about fabricating evidence. PV_0026 is
  about fabricating the self. The manufactured case vs. the
  manufactured cop.

