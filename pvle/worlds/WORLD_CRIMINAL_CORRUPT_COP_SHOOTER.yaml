  - "holstered sidearm"
  - "body camera with blinking red light"

# ============================================================
# SNAP MOMENT (with delay + loss of agency)
# ============================================================
snap_moment:
  description: >
    The single moment that shifts the episode from system horror
    to personal horror. Built with three beats: the contradiction,
    the visual evidence, and the loss of agency. The viewer realizes
    before the cop. The cop realizes they did not decide. The
    addiction fired for them.
  setup: >
    You shout: "Show your ID." They reach.
  fire: >
    You fire.
  delay_beat: >
    You see the ID after they fall.
  loss_of_agency: >
    You remember telling them to reach.
    You don't remember deciding to fire.
  aftermath: >
    The ID is on the ground. Open. Photo facing up.
    You told them to reach for it.
  placement: "Late Phase 3 or early Phase 4 - after pattern is established and loop feels routine."
  effect: >
    Three-layer horror: (1) the viewer sees the contradiction
    before the cop does, (2) the cop realizes they caused what
    they punished, (3) the cop realizes they did not consciously
    decide to fire - the addiction acted. The five words will still
    work. But the cop knows something the system does not: the
    trigger pulled itself.

# ============================================================
# IDENTITY EROSION (addiction arc)
# ============================================================
identity_erosion:
  description: >
    The cop does not become a killer in one moment. The holster
    stops being a last resort and starts being a first instinct.
    This is not corruption. This is addiction. The substance is
    control. The system is the dealer. The badge is the prescription.
  arc_type: "PROGRESSIVE_ADDICTION"
  stages:
    - stage: "FEAR"
      marker: "You join to protect. The weapon is heavy on your hip. You hope you never use it."
      emotional_core: "The gun is a burden."
    - stage: "DISCOVERY"
      marker: "You draw on someone unarmed. They freeze. Everything stops. Except you. You expected fear. What you felt was control."
      emotional_core: "The gun is a feeling."
    - stage: "FIRST_HIT"
      marker: "You fire. They clear you in forty minutes. No one asks. The system does not check. The system files."
      emotional_core: "The system permits."
    - stage: "TOLERANCE"
      marker: "One draw does not do it anymore. You need the escalation. The commands. The moment they freeze. You decide what happens next."
      emotional_core: "The dosage increases."
    - stage: "DEPENDENCE"
      marker: "You approach every call with your hand on the holster. You reach before you think. It is not a decision. It is posture."
      emotional_core: "The weapon is your body language."
    - stage: "IDENTITY"
      marker: "You look at the report. You recognize the words. Not the person. You remember writing it. You don't remember why."
      emotional_core: "The addiction is who you are."

# ============================================================
# CONTAGIOUS ADDICTION (the infection spreads)
# ============================================================
contagious_addiction:
  description: >
    The cop's addiction does not stay contained. It infects.
    The rookie rides along. Watches. Hesitates. Then follows.
    This is not mentorship. This is transmission. The system
    does not need to teach corruption. It just needs to pair
    the rookie with you.
  progression:
    - stage: "OBSERVATION"
      beat: "The rookie watches you draw on someone unarmed. Says nothing. Eyes wide."
    - stage: "HESITATION"
      beat: "The rookie's hand hovers near the holster. Does not commit. Looks at you."
    - stage: "INFECTION"
      beat: "The rookie hesitates. You don't. The rookie fires after you. Your decision became theirs. They did not decide."
    - stage: "REPLICATION"
      beat: "You teach the rookie the five words. The rookie uses them next month. Same phrase. Same weight. Different person. The cycle is complete."

# ============================================================
# ENDING LOGIC (memory distortion)
# ============================================================
ending_logic:
  description: >
    The ending is not about forgetting. It is about distortion.
    The cop does not lose memory. The cop loses the connection
    between words and meaning, between reports and people, between
    actions and reasons. The five words still work. But they have
    become pure procedure - disconnected from any experience they
    once described.
  ending_beats:
    - "You look at the report. You recognize the words. Not the person."
    - "You remember writing it. You don't remember why."
    - "'I feared for my life.' You don't remember if you did."
    - "You reach before you think. You stopped noticing."
  final_image: >
    The cop writing the report. Same words. Same form. The face
    across the desk has changed. The words have not. They never do.

# ============================================================
# CREATIVE CONSTRAINTS
# ============================================================
creative_constraints:
  primary_rule: "ADDICTION_NOT_SYSTEM"
  description: >
    The horror is not a broken system. The horror is what happens
    when a person discovers that pointing a weapon at someone
    feels like control. The system is the enabler - it never asks,
    never checks, always clears. But the engine of the episode is
    the cop's escalating need for the feeling of deciding who is
    dangerous. Corruption is not the system failing. Corruption is
    the cop becoming addicted to what the system permits.
  subject_framing: >
    Subject starts with genuine fear of the weapon. The transition
    to addiction is shown through the body - hand drifting to holster,
    contradictory commands delivered faster each time, body camera
    that clicks off without looking. The coldest realization: the
    cop does not draw because of danger. The cop draws because not
    drawing feels wrong. The weapon is not a tool. It is a need.
  ending_logic: >
    The ending lands on memory distortion, not memory loss. The cop
    recognizes their own words but not the person they describe.
    Remembers writing the report but not the reason. The signature
    line returns empty. The secondary motif completes: "You reach
    before you think" has become permanent. The cop has become the
    system's answer to every question it refuses to ask.
  system_horror_rule: >
    NEVER explain the system. NEVER name legal doctrines in VO.
    Show the system through what it does NOT do: it does not ask,
    does not check, does not remember. The most powerful line about
    the system is: "No one asks the question that would break the
    answer." The viewer feels the system without being taught.
  control_experience_rule: >
    NEVER say "control." SHOW control through its effects:
    "They freeze when you point the gun. Everything stops. Except
    you." The viewer must experience the same power rush the cop
    feels. Addiction only works if the high is real for the audience.
  forbidden_framing:
    - "Explaining legal doctrines in VO (Graham v. Connor, qualified immunity - WRITER REFERENCE ONLY)"
    - "Saying 'control' or 'power' directly - SHOW through freeze/stop/decide"
    - "Heroic whistleblower or redemption arc"
    - "Single bad apple narrative - the system is the enabler"
    - "Glorification of violence as action-movie excitement"
    - "Pure psychopath without the original fear that made addiction possible"
    - "Explicit racial framing - show profiling through geography and behavior coding only"
    - "Explaining the system - the system is felt, never taught"
  required_framing:
    - "'I feared for my life' - 3x with escalation: mechanical -> automatic -> empty"
    - "Ending variation: 'You don't remember if you did.'"
    - "'You reach before you think' - secondary motif 3x: warning -> habit -> identity"
    - "4-beat loop (profile, escalate, fire, narrate) with MUTATION + TEMPO each cycle"
    - "Control shown experientially: 'Everything stops. Except you.'"
    - "Contradictory commands as escalation tool, tempo increasing each cycle"
    - "Addiction arc: fear -> control -> habit -> identity"
    - "Snap moment: three beats - contradiction, delay ('ID after they fall'), loss of agency ('don't remember deciding to fire')"
    - "Contagious addiction: rookie hesitates, then fires after you, then learns the five words"
    - "Body camera as motif: blinking -> click -> absent (show don't tell)"
    - "System shown through absence: never asks, never checks, always clears"
    - "Ending: memory distortion - recognize the words, not the person"

# ============================================================
# MICRO-BEHAVIORS (motif with rhythm + tempo escalation)
# ============================================================
micro_behaviors:
  description: >
    Three signature micro-actions that repeat as motifs. Each
    one evolves across the episode. The repetition creates the
    heartbeat of the video - one motif every 30-60 seconds of
    VO. The evolution creates dread without explanation.
  frequency: "1 motif return every ~30-60 seconds of VO"
  behaviors:
    - motif: "THE_HAND"
      description: "Hand moves to holster."
      progression:
        - "Your hand rests on the holster. You notice. You pull it back."
        - "Your hand is on the holster. You don't remember moving it."
        - "Your hand never left. Someone else notices. You don't."
    - motif: "THE_COMMANDS"
      description: "Contradictory commands that make compliance impossible."
      progression:
        - "'Show your hands. Get on the ground.' Slow. Deliberate. Pause between."
        - "'Hands up. On the ground. Don't move.' Faster. Overlapping. No pause."
        - "You start the command. You don't finish it. The gun finishes it."
    - motif: "THE_CAMERA"
      description: "Body camera state."
      progression:
        - "The red light blinks. You notice it."
        - "You hear the click. You don't look."
        - "[absent] - the viewer understands without being told."

# ============================================================
# PHASE GUIDANCE (for outline generator)
# ============================================================
phase_guidance:
  description: >
    Recommended narrative weight distribution across the episode.
    Not hardcoded runtime - the outline generator maps these
    to the actual phase structure.
  phases:
    - phase: "CONDITIONING"
      weight: "~10%"
      content: "Hook + training room. Five words taught. First patrol. Weapon is heavy."
      signature_use: "'I feared for my life' (mechanical)"
      motif_use: "'You reach before you think' (warning)"
    - phase: "FIRST HIGH"
      weight: "~20%"
      content: "First draw. Discovery of control. 'Everything stops. Except you.'"
      key_moment: "The feeling that changes everything. Not fear. Control."
    - phase: "ESCALATION"
      weight: "~35%"
      content: "Loop mutation cycles 2-4. Tempo accelerates. Commands overlap. System clears."
      retention_note: "This phase holds the middle. Loop mutation prevents predictability. Tempo escalation creates urgency."
    - phase: "SNAP"
      weight: "~15%"
      content: "The ID scene. Three beats: contradiction, delay, loss of agency."
      signature_use: "'I feared for my life' (automatic, but the cop knows it's empty)"
    - phase: "ERASURE"
      weight: "~20%"
      content: "Contagious addiction (rookie). Memory distortion. Report = identity."
      signature_use: "'I feared for my life.' You don't remember if you did."
      motif_use: "'You reach before you think' (identity - permanent)"

# ============================================================
# TENSION CATALYSTS
# ============================================================
tension_catalysts:
  - "Your first draw. No shot. But your hand does not shake. It should shake."
  - "They freeze when you point the gun. Everything stops. Except you. You want to feel it again."
  - "They clear you in forty minutes. You spend longer choosing lunch."
  - "Your shooting count is the highest in the precinct. Your sergeant calls you proactive."
  - "A bystander has a phone. You did not see the phone. The phone saw everything."
  - "The victim's family holds a press conference. Your name is not released. Theirs is."
  - "The rookie hesitates. You don't. The rookie fires after you."
  - "You drive through the neighborhood off duty. Someone recognizes you. They cross the street."
  - "You approach a call. Your hand is already on the holster. It was there before the dispatcher finished talking."
  - "Another officer fires because you fired. Three weapons. One target. One threat assessment. Yours."

# ============================================================
# IRREVERSIBLE MARKERS
# ============================================================
irreversible_markers:
  - "You shoot someone reaching for the ID you told them to show. You see the ID after they fall. You don't remember deciding to fire."
  - "You write 'furtive movement' for the third time. Same words. Different person. You don't remember the first."
  - "The rookie hesitates. You don't. The rookie fires after you. Your decision became theirs."
  - "You teach the rookie the five words. The rookie uses them next month. The cycle is complete."
  - "Someone you shot survives. Files a civil suit. Dismissed. You never learn their name."
  - "You hear 'officer-involved shooting' on the news. It is yours. You feel nothing."
  - "You look at the report. You recognize the words. Not the person."

