WORLD_ID: WORLD_CRIMINAL_CORRUPT_COP_SHOOTER
display_name: "The Cop Who Decides Who Gets Shot"
domain: CRIMINAL
era: MODERN_CONTEMPORARY
implied_identity_mode: GENERIC_ARCHETYPE
implied_person: null
parent_world: WORLD_CRIMINAL_CORRUPT_COP

tags:
  - police_corruption
  - lethal_force
  - progressive_addiction
  - use_of_force
  - systemic_violence
  - control_as_identity

seed_keywords:
  - "cop who decides who gets shot"
  - "officer-involved shooting"
  - "I feared for my life"
  - "use of force"
  - "police shooting"
  - "lethal force decision"

# ============================================================
# EMOTIONAL SPINE (core addiction arc)
# ============================================================
emotional_spine:
  arc: "fear -> control -> habit -> identity"
  description: >
    The episode is not about a corrupt system. It is about what
    happens when a person discovers that pointing a weapon at
    someone feels like control, not fear. The system does not
    corrupt the cop. The system gives the cop permission to stay
    addicted. Each phase escalates the addiction - until drawing
    the weapon is not a decision. It is who they are.
  phase_mapping:
    fear: "Training + first patrol. The weapon is heavy. You hope you never use it."
    control: "First draw on unarmed person. You expected fear. You felt power."
    habit: "Pattern established. Drawing is not a response. It is how you start conversations."
    identity: "You cannot remember a version of yourself that did not reach for the holster first."

# ============================================================
# HOOK IDENTITY (viral-optimized, experiential)
# ============================================================
hook_identity:
  primary: >
    The call comes in.
    You haven't arrived yet.
    You already know who it is.
  alternates:
    - >
      You don't protect people.
      You sort them.
    - >
      Five words close every investigation.
      You learned them in training.
      Before you learned how to aim.
    - >
      The split-second decision.
      You made it before you left the car.

# ============================================================
# SIGNATURE LINE (repeats with escalating emptiness)
# ============================================================
signature_line:
  line: "I feared for my life."
  escalation_pattern:
    occurrence_1:
      context: "Training room. Instructor teaches it like a formula."
      weight: "MECHANICAL - memorized, rehearsed, clinical."
      note: "The phrase is taught BEFORE they learn to aim. This order matters."
    occurrence_2:
      context: "After first shooting. Review board asks. The words come out without thinking."
      weight: "AUTOMATIC - the phrase is muscle memory. Faster than thought."
    occurrence_3:
      context: "Ending. After the snap moment. Filing the last report."
      weight: "EMPTY - the words have no meaning. But they still work. Every time."
  ending_variation: >
    "I feared for my life."
    You don't remember if you did.

# ============================================================
# SECONDARY MOTIF (internal awareness line)
# ============================================================
secondary_motif:
  line: "You reach before you think."
  description: >
    Unlike the signature line (system phrase, outward-facing), this
    line is self-awareness (inward-facing). It tracks the cop's
    relationship to their own body. The signature line is what the
    system hears. This line is what the cop feels.
  escalation_pattern:
    early: "WARNING - You notice your hand moved. You pull it back."
    mid: "HABIT - You notice your hand is already there. You don't pull it back."
    end: "IDENTITY - You don't notice anymore. Someone else does."

# ============================================================
# CORE MECHANIC (4-beat POV loop with mutation + tempo)
# ============================================================
core_mechanic:
  name: "THE_CALCULATED_SHOT"
  description: >
    The cop does not react. The cop decides. The split-second is
    a lie. The split-second was chosen minutes ago. But the real
    horror: each loop is not a repetition. It is a mutation. The
    hesitation shrinks. The commands get faster. The trigger gets
    lighter. By the end, the loop runs without the cop thinking.
  pov_loop:
    structure: "profile -> escalate -> fire -> narrate"
    beats:
      - beat: "PROFILE"
        line: "You decide who looks dangerous."
        note: "Target selection before contact. Happens in the car. Zip code = threat level."
      - beat: "ESCALATE"
        line: "You create the confrontation."
        note: "Contradictory commands. 'Show your hands. Get on the ground.' They can't do both. That's the point."
      - beat: "FIRE"
        line: "The split second."
        note: "Presented as reaction. Actually the conclusion of a sequence you started."
      - beat: "NARRATE"
        line: "Five words."
        note: "'I feared for my life.' The file closes. No one asks the question that would break the answer."
  loop_mutation:
    description: >
      Each repetition of the loop degrades in BOTH logic AND tempo.
      Logic: the steps reorder and collapse. Tempo: the pauses
      between beats shrink until the loop is nearly instantaneous.
      By the final cycle, there is no command, no pause, no thought.
      Profile and fire are the same beat.
    progression:
      - cycle: 1
        mutation: "draw -> hesitate -> holster. No shot. But the feeling stays."
        tempo: "SLOW - long pauses between beats. Time to think. Time to stop."
        emotional_state: "discovery of power"
      - cycle: 2
        mutation: "aim -> force compliance -> no shot needed. The gun is the conversation."
        tempo: "MEASURED - fewer pauses. Commands are deliberate but quick."
        emotional_state: "control as communication"
      - cycle: 3
        mutation: "fire when 'avoidable.' Review board clears. System confirms."
        tempo: "FAST - commands overlap. Compliance window shrinks."
        emotional_state: "permission granted"
      - cycle: 4
        mutation: "fire when 'unnecessary.' You know it. Report says otherwise."
        tempo: "COMPRESSED - nearly seamless. No gap between escalate and fire."
        emotional_state: "habit overrides conscience"
      - cycle: 5
        mutation: "fire before you finish the command. Profile and fire are the same beat now."
        tempo: "INSTANTANEOUS - no complete command. No pause. No thought."
        emotional_state: "identity complete"

# ============================================================
# KEY FACTS
# ============================================================
key_facts:
  # --- Killer lines (VO-ready, EXPERIENTIAL) ---
  # Control experience (the viewer must FEEL it, not understand it)
  - "They freeze when you point the gun. Everything stops. Except you."
  - "You decide what happens next. No one interrupts you. No one can."
  - "You expected fear. What you felt was control. You want to feel it again."
  # Operational details
  - "You learn the five words before you learn to aim. That order is not an accident."
  - "You shout 'drop the weapon' after you fire. The audio does not have timestamps in court."
  - "You give two commands at once. They can't do both. That's the point."
  - "Your body camera clicks. You don't look at it. You already know."
  - "No one asks the question that would break the answer."
  - "They clear you in forty minutes. Forty minutes for a life."
  - "Your partner saw what happened. Your partner saw what you wrote. Those are different events."
  # Contagion
  - "The rookie hesitates. You don't. The rookie fires after you. Your decision became theirs."
  - "You reach before you think."

  # --- System context (WRITER REFERENCE ONLY - never enters VO directly) ---
  - "[REF] Graham v. Connor (1989): use of force judged by 'objectively reasonable' standard from officer's perspective, not hindsight. This is WHY 'I feared for my life' is sufficient."
  - "[REF] Tennessee v. Garner (1985): deadly force only if suspect poses significant threat. In practice, officer's stated perception is rarely challenged."
  - "[REF] Approximately 1,000 fatal police shootings annually in the US. No mandatory comprehensive federal reporting system."
  - "[REF] Qualified immunity: officers shielded unless exact conduct previously ruled unconstitutional in nearly identical facts."
  - "[REF] Contagious shooting: Amadou Diallo - 41 rounds at unarmed man reaching for wallet. All four officers acquitted."
  - "[REF] Officers involved in fatal shootings charged in fewer than 2% of cases."
  - "[REF] 'Furtive movement' - the phrase in reports when there was no weapon. Legally sufficient. Functionally unfalsifiable."

# ============================================================
# KEY LOCATIONS
# ============================================================
key_locations:
  - id: LOC_TRAINING_ROOM
    name: "The Training Room"
    description: "Where the five words are taught like a formula. Before the range. Before the badge. The phrase comes first."
  - id: LOC_PATROL_CAR
    name: "The Patrol Car"
    description: "Where the decision is made before the door opens. MDT shows the address. You already know."
  - id: LOC_SIDEWALK
    name: "The Sidewalk"
    description: "Where commands overlap and compliance becomes impossible. Where the split second lives."
  - id: LOC_PRECINCT_DESK
    name: "The Precinct Desk"
    description: "Where five words become the official record. Where 'furtive movement' replaces what happened."
  - id: LOC_REVIEW_BOARD
    name: "The Review Board Room"
    description: "They already agree with you before you speak. Forty minutes for a life."
  - id: LOC_LOCKER_ROOM
    name: "The Locker Room"
    description: "Where your partner learns what they saw. Where stories align before the file opens."
  - id: LOC_TARGET_NEIGHBORHOOD
    name: "The Target Neighborhood"
    description: "Where threat level is decided by zip code. Where you arrive already reaching."

key_tensions:
  - POWER_VS_ISOLATION
  - DUTY_VS_SELF
  - PROTECTION_VS_CONTROL

