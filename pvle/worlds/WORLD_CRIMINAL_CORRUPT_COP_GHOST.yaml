# ============================================================
# FAILURE MECHANICS
# ============================================================
failure_mechanics:
  description: >
    The system occasionally cracks - a traffic camera, a witness
    with a phone, a federal investigation that matches missing
    persons reports to traffic stop data. But the real horror:
    the system's defense is the truth. There is no record. There
    is no booking. There is no evidence of custody. The absence
    is the armor. The system cannot produce what was never entered.
  pattern:
    - "A traffic camera captured your stop. You took someone. No booking follows. A data analyst notices the gap. The gap is not illegal. Gaps exist. Your gap has a pattern."
    - "A civil rights attorney matches missing persons reports to traffic stop locations. Your zone. Your shift. No bookings. The correlation is not proof. But it is a question no one has asked yet."
    - "A federal investigation opens. They request booking records. Your records are clean. Perfectly clean. Nothing missing. Nothing extra. The absence of anomalies is its own anomaly."
    - "Someone you took reappears. They file a report. They say your badge number. You say: no record of the stop. Their word against the database. The database wins."

