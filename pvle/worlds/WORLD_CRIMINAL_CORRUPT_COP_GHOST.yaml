  PV_0026 fabricates self-defense. PV_0027 fabricates cooperation.
  PV_0028 fabricates the scene. PV_0029 fabricates ABSENCE.
  The Ghost is the inverse of the entire series: the others ADD
  something false. The Ghost REMOVES something real. Without the
  Ghost, the disappeared would eventually surface. With the Ghost,
  the system says they were never there. And the system is correct.

