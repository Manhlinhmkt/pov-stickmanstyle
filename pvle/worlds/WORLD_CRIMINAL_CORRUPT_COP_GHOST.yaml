# ============================================================
# EMOTIONAL SPINE (erasure-of-person arc)
# ============================================================
emotional_spine:
  arc: "convenience -> control -> selection -> authorship"
  description: >
    The episode is not about a cop who kills people. It is about
    a cop who makes people stop existing inside the system. No
    booking. No record. No phone call. No lawyer. The system does
    not need to lie. The system just needs an empty database. And
    you keep it empty. Each phase escalates the erasure - from
    skipping paperwork to building infrastructure to selecting
    who deserves to exist at all. Until the cop cannot tell
    whether the empty database means they erased someone or no
    one was ever there.
  phase_mapping:
    convenience: "You skip booking once. Not because you forgot. Because you decided not to. That distinction matters."
    control: "You decide who enters the official system and who enters the shadow. The database is your gate."
    selection: "You choose people no one is looking for. That's the skill. Not detention. Selection."
    authorship: "If there's no record, it didn't happen. If they were never booked, they were never arrested. They were never there."

# ============================================================
# HOOK IDENTITY (viral-optimized, experiential)
# ============================================================
hook_identity:
  primary: >
    You pull them over.
    You put them in the car.
    You don't book them.
    They were never here.
  alternates:
    - >
      Someone calls the precinct
      looking for the person you took.
      The system says: no record.
      The system is correct.
    - >
      You don't kill people.
      You don't arrest people.
      You make them stop existing.
      The system does the rest.
    - >
      You don't call it in.
      Not because you forgot.
      Because you decided not to.

# ============================================================
# SIGNATURE LINE (repeats with escalating dissolution)
# ============================================================
signature_line:
  line: "They were never here."
  escalation_pattern:
    occurrence_1:
      context: "After first off-book hold. Describing what the system shows when someone checks."
      weight: "PROCEDURAL - describing system output. The database is empty. That is a fact."
      note: "The phrase sounds like a database result. Neutral. Technical. True."
    occurrence_2:
      context: "After snap moment. Standing ten feet from the phone while the desk sergeant says the words."
      weight: "POSSESSIVE - the phrase is no longer about the system. It is about your power. You decided they were never here."
      note: "Same words. The viewer hears them as an act of will now. Not a system response."
    occurrence_3:
      context: "Ending. New person in the car. Same route past booking. Same destination."
      weight: "IDENTITY - you don't detain people. You erase them. This is who you are."
  ending_variation: >
    "They were never here."
    You don't remember if they were.

# ============================================================
# SECONDARY MOTIF (the system check)
# ============================================================
secondary_motif:
  line: "You check the system. No record."
  description: >
    The act of checking the database after an erasure. The cop
    verifies their own absence - confirms that the person they
    took does not exist in the system. This motif tracks the
    cop's relationship to their own fabrication of emptiness.
  escalation_pattern:
    early: "ANXIOUS - You check the system three times. Not for them. For yourself. The absence holds. You exhale."
    mid: "AUTOMATIC - You don't check anymore. You know there's nothing to find. You built the nothing."
    end: "CONFUSION - You check the system. No record. You don't remember if you erased it or if it was never there."

# ============================================================
# SYSTEM PHRASE (the desk sergeant's confirmation)
# ============================================================
system_phrase:
  line: "No one by that name was brought in."
  description: >
    The phrase the desk sergeant says when someone calls looking
    for the person you took. Technically true. No booking means
    no record means no person. The system confirms your lie by
    doing what systems do: checking the database. The database
    is empty. Because you never filled it. The horror is not
    that the system lies. The horror is that the system tells the
    truth. Your absence IS the truth now.
  usage: >
    Appears 3-4 times. First: FALSE SAFETY - you hear it after
    the first erasure. A friend calls. Not a child. Not yet.
    Just someone who knows their name. The system says no record.
    That is your first taste of power. Second: a lawyer calls.
    Same answer. Same nothing. Routine. Third: the child calls.
    Same words. Same empty database. You are standing ten feet
    away. You hear the dial tone. Fourth: you say it yourself.
    Someone asks you directly. The words come out. You don't
    check the system first. You don't need to.
  key_lines:
    - "A friend calls looking for them. 'No one by that name was brought in.' You hear it from across the room. The system works. You exhale. That is the first hit."
    - "The lawyer calls. You hear the sergeant: 'No record of that individual.' The lawyer hangs up. The individual is thirty feet from the phone."
    - "A child calls. 'Is my dad there?' The sergeant checks. 'No one by that name.' The child asks again. Same answer. Same empty database. Same dad in the room with no camera."
    - "Someone asks you directly. You say the words yourself. You don't check first. You don't need to check what you built."

# ============================================================
# SCENE ANCHOR (THE ROOM - spatial thread)
# ============================================================
scene_anchor:
  description: >
    One specific space the viewer tracks across the episode. Not
    a person. Not an object. A room. THE room. No camera. No
    booking terminal. No window. It does not appear on the
    precinct floor plan. Everyone calls it 'the waiting room.'
    The room is the TRUE CHARACTER of this episode. The cop is
    the operator. The room is the machine.
  identification: "THE_ROOM"
  spatial_anchor: "the room with no camera, no window, no floor plan entry"
  room_origin: >
    The room was there before you. That is the horror beneath
    the horror. You did not build the infrastructure. You found
    it. Someone walked this hallway before you. Someone opened
    this door before you. The room does not need a teacher. The
    room needs a user. And you were not the first.
  stages:
    - stage: "FIRST_SIGHT"
      phase: "Phase 1-2 - First Awareness"
      markers:
        - "You walk past a door with no label. You hear nothing. A senior cop walks out. Doesn't look at you."
        - "You ask what's behind the door. The answer is a look. The look says: don't ask."
        - "You learn the name later. The waiting room. Everyone knows what it means. No one says what it means."
      note: "Viewer meets the room before the cop uses it. The room exists as infrastructure someone else built. The cop inherits it."
    - stage: "FIRST_USE"
      phase: "Phase 2 - First Erasure"
      markers:
        - "You walk someone past booking. Past the desk. Past the cameras. To the door with no label."
        - "Inside: a chair. A table. A light. No camera. No recording. No booking terminal. No name on the wall."
        - "They ask when they can leave. You don't answer. The question assumes they arrived."
      note: "The viewer watches the cop use infrastructure they did not build. The room was waiting. The cop just had to walk through the door."
    - stage: "INFRASTRUCTURE"
      phase: "Phase 3 - System Expansion"
      markers:
        - "You check the room before your shift. How many inside. You check it the way other people check the weather."
        - "You have a number. Current occupancy. You don't use names. Names create memory. Numbers create distance."
        - "The room is fuller than the holding cells. The holding cells have cameras. The room does not."
      note: "The room becomes the cop's primary workspace. The official system is the secondary."
    - stage: "AUTONOMOUS"
      phase: "Phase 3 Late - Room > Cop"
      markers:
        - "You check the room before your shift. It's not empty. It should be empty."
        - "You don't remember putting them there. You try. You can't."
        - "Either you forgot. Or the room is being used by someone else now. You don't know which is worse."
      note: "CRITICAL RETENTION BEAT. The room has exceeded the cop. The infrastructure no longer needs the architect. This is the first perception distortion - deployed mid-video to prevent predictability."
    - stage: "SILENCE"
      phase: "Phase 4 - Post-Snap"
      markers:
        - "You walk past the room. It's empty. You don't know when it emptied."
        - "You check the system. No record of anyone being in the room. No record of the room."
        - "You stand in the doorway. The chair is there. The table is there. The light is on. No one is inside. You don't remember the last person who was."
      note: "The room becomes the physical manifestation of the cop's memory erosion. Empty room, empty database, empty memory."
  post_snap_line: "The room is empty. The system is empty. You don't know which you emptied and which was always empty."

# ============================================================
# PERCEPTION DISTORTION (escalating unreliability)
# ============================================================
perception_distortion:
  description: >
    The world's unique retention mechanic. Unlike PV_0028's
    friction (external contradictions), PV_0029 uses INTERNAL
    perception failure. The cop's memory becomes as empty as the
    database they maintain. Deployed strategically to break loop
    predictability and prevent mid-video drop.
  principle: >
    Each distortion should make the viewer question whether the
    cop is in control or the system is running itself. The
    distortion is NOT explained. It is FELT. The viewer cannot
    tell if the cop forgot or if the infrastructure has other
    users. That ambiguity IS the horror.
  deployment:
    - timing: "Phase 3 mid (~5:30)"
      distortion: "Room is occupied when it should be empty. You don't remember putting them there."
      effect: "First crack in the cop's control narrative. Loop broken."
    - timing: "Phase 3 late (~7:00)"
      distortion: "You check the count. It doesn't match. One more than you remember taking."
      effect: "Scale of the system exceeds the cop. Infrastructure is alive."
    - timing: "Phase 4 post-snap (~10:00)"
      distortion: "You check the system. No record. You check your memory. You find one. Then you're not sure."
      effect: "Memory and database begin to merge. Both are empty. Both should not be."
    - timing: "Phase 5 ending (~14:30)"
      distortion: "You find a memory. You delete it. Active erasure of self."
      effect: "The cop has internalized the method. Now applies it to themselves."
  note: >
    Deploy 1 distortion every ~90s during the dangerous middle
    section (4:00-9:00). This prevents the loop from becoming
    predictable and gives the viewer something the other corrupt
    cop episodes did not: the sense that the system is BIGGER
    than the cop operating it.

# ============================================================
# CORE MECHANIC (4-beat POV loop with surprise mutation)
# ============================================================
core_mechanic:
  name: "THE_ERASED_CUSTODY"
  description: >
    The cop does not kill people. The cop does not beat people.
    The cop makes people stop existing in the system. The skill
    is not violence. The skill is selection - choosing people
    whose absence will not be noticed, whose families will not
    call, whose lawyers do not exist. The 4-beat loop mirrors
    a normal arrest - but removes every checkpoint that would
    make the person visible to the system. No dispatch call.
    No booking. No phone call. No record. By the time the loop
    completes, the person was never in custody.
  pov_loop:
    structure: "stop -> take -> hold -> erase"
    beats:
      - beat: "STOP"
        line: "You choose them."
        note: "Selection. Not random. Deliberate. Who looks like no one will notice."
      - beat: "TAKE"
        line: "You put them in the car."
        note: "Radio off. Camera off. No dispatch call. No code. The car becomes the portal."
      - beat: "HOLD"
        line: "You don't book them."
        note: "The waiting room. No camera. No booking terminal. No phone. No lawyer. No name."
      - beat: "ERASE"
        line: "They were never here."
        note: "The absence IS the crime. No paperwork means no arrest means no person."
  loop_mutation:
    description: >
      Each repetition degrades in BOTH selectivity AND awareness.
      But critically: each cycle contains a SURPRISE element that
      breaks the viewer's expectation of the loop. The loop does
      not just escalate. It DISTORTS. The viewer should never be
      able to predict what happens at the end of a cycle.
    progression:
      - cycle: 1
        label: "CONVENIENT"
        mutation: "First off-book hold. Too much paperwork. Too late at night. You skip booking. They're gone by morning. No one asks."
        tempo: "SLOW - you check the system three times. Not for them. For yourself. The absence holds. You exhale."
        emotional_state: "relief as justification"
        surprise: null
        surprise_note: "No surprise. Baseline. Establishes the clean loop so viewers learn the rhythm."
      - cycle: 2
        label: "DELIBERATE"
        mutation: "You choose them. Not because of paperwork. Because you can. Because no one is looking for them."
        tempo: "MEASURED - you check the system once. You know it works. The absence is reliable."
        emotional_state: "power as competence"
        surprise: >
          You test the boundary. Someone with a phone that
          keeps ringing. Someone who says 'yes' when you ask
          'does anyone know you're here?' You book this one.
          Normal process. The contrast is the reveal: you can
          choose. That is the power. Not the room. The gate.
        surprise_note: "The viewer sees the INVERSE of the loop - a normal booking - and understands: the cop is now CHOOSING who gets rights. Selection becomes active, not passive."
      - cycle: 3
        label: "SYSTEMATIC"
        mutation: "You have a pipeline. Selection criteria. Routes that bypass cameras. The room. The timing. Infrastructure."
        tempo: "FAST - no checking. You know the system is empty because you keep it empty."
        emotional_state: "efficiency as identity"
        surprise: >
          You check the room before your shift. It's not empty.
          It should be. You don't remember putting them there.
          Either you forgot. Or the room has another user now.
          You don't check which.
        surprise_note: "CRITICAL DISTORTION. The room exceeds the cop. This is the moment the loop breaks expectation. The viewer thought they understood the system. They did not. The infrastructure is alive."
      - cycle: 4
        label: "AUTOMATIC"
        mutation: "You take someone off the street. You don't remember why. You walk past booking without thinking. The room door opens. Your hand knows the handle."
        tempo: "COMPRESSED - no selection. No criteria. The loop runs without the cop deciding."
        emotional_state: "compulsion replaces choice"
        surprise: >
          The count doesn't match. One more than you remember
          taking. You recount. Same number. You cannot account
          for all of them. The system you built has exceeded
          your memory of building it.
        surprise_note: "The count mismatch is the final proof: the cop is no longer the architect. The cop is another user of infrastructure they can no longer track."

# ============================================================
# KEY FACTS (VO-ready + writer reference)
# ============================================================
key_facts:
  # --- Killer lines (short, cold, experiential) ---
  - "You pull them over. You put them in the car. You don't call it in. Not because you forgot. Because you decided not to."
  - "The booking system has no entry because you never made one."
  - "No booking. No phone call. No lawyer. No name. No person."
  - "They get one question: 'Does anyone know you're here?' If the answer is no, you have all the time in the world."
  - "The desk sergeant says 'no one by that name was brought in.' It's true. You never brought them in. You brought them somewhere else."
  - "You choose people no one is looking for. That's the skill. Not detention. Selection."
  - "The room has no camera. It doesn't appear on the floor plan. Everyone calls it 'the waiting room.'"
  - "They ask when they can leave. You don't answer. The question assumes they arrived."
  - "Someone files a missing persons report. The last known location is a traffic stop. Your traffic stop. Your camera was off."
  - "You have a number. How many right now. You check it the way other people check the weather."
  - "The lawyer calls. 'Is my client there?' The system checks. No record. The client is thirty feet from the phone."
  - "You walk past booking every night. The desk sergeant doesn't look up anymore. Doesn't need to."
  - "You don't kill people. You don't arrest people. You make them stop existing. The system does the rest."
  - "Someone new in the car. Same route past booking. Same door. Same room. Same nothing."
  - "The first time, you check the system three times. Not for them. For yourself."
  - "You test it. Someone with a job. Someone with a phone that keeps ringing. Someone who says yes. You book this one. The contrast is the power."
  - "You check the room. It's not empty. It should be. You don't remember putting them there."
  - "Names create records. Records create people. You've learned to think in absences."
  - "You find a memory. You delete it."

  # --- Retention hooks (curiosity-gap, deploy every 60-90s) ---
  - "Does anyone know you're here?" # selection criteria
  - "The room." # spatial anchor
  - "No record." # system confirmation
  - "The child calls." # snap moment echo
  - "How many right now." # inventory horror
  - "They were never here." # signature
  - "You don't remember putting them there." # perception distortion
  - "You don't remember if they were." # dissolution
  - "You book this one." # contrast/surprise

  # --- System context (WRITER REFERENCE ONLY) ---
  - "[REF] Chicago Homan Square: Guardian investigation revealed CPD operated an off-the-books interrogation facility. At least 7,000+ people detained 2004-2015 without appearing in booking databases. Denied attorney access. Families could not locate them."
  - "[REF] 'Ghost detainee': term for persons held without official record. Originated in CIA black site context (Abu Ghraib, Salt Pit). The concept exists at local policing level through booking gaps and pre-arraignment holds."
  - "[REF] In most US jurisdictions, police can hold a person 24-72 hours before arraignment. During this window, the detainee exists in a bureaucratic void - between 'field contact' and 'booking' - with no formal record of custody."
  - "[REF] Pre-booking detention creates a documentation gap: no arrest record exists until booking is complete. A person detained but never booked was - according to the system - never in custody."
  - "[REF] The 'transfer shuffle': immigration detainees moved between ICE facilities so frequently that attorneys and family members cannot locate them. ICE has acknowledged difficulty tracking detainees within its own system."
  - "[REF] Multiple DOJ pattern-or-practice investigations documented off-the-books holds where suspects were questioned without Miranda warnings in unofficial locations before being formally arrested - or released without any record of the encounter."
  - "[REF] Homan Square detainees reported being shackled to benches, denied access to attorneys for 12-24 hours, and not appearing in any police database. When attorneys arrived, police denied the person was in custody."

