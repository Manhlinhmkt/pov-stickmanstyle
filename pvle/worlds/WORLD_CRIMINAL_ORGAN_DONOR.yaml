# CREATIVE CONSTRAINTS (episode-level enforcement)
creative_constraints:
  primary_rule: "THE_BODY_IS_THE_PRICE"
  description: >
    The narrative lives inside the body. Every sensation is currency.
    The horror is not violence but transaction - the moment a human being
    becomes inventory. The surgery itself is a gap - you go under, you wake
    up lighter. The real story is before and after: the desperation that
    brings you here and the emptiness that follows you home.
  subject_framing: >
    Subject is not a criminal - they are poverty made flesh. The core
    mechanism is the commodification of desperation - how the system converts
    human need into human parts. The body is both the product and the price.
  forbidden_framing:
    - "Graphic surgical gore or body horror"
    - "Subject as willing participant or entrepreneur"
    - "Poverty porn or pity framing"
    - "Heroic sacrifice narrative"
    - "Cool or edgy nihilism"
  required_framing:
    - "Desperation as the only engine of consent"
    - "The body remembering what the mind tries to forget"
    - "Promise vs reality - the money that never comes"
    - "The scar as permanent social marker"
    - "Ending lands on the impossibility of buying back what was sold"

