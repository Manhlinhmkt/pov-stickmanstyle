key_facts:
  - "Poverty is the primary driver - sellers are recruited from impoverished communities with promises of $5,000-$10,000 that are rarely paid in full"
  - "Brokers lie to sellers - claiming kidneys regenerate, or that humans have three kidneys - to minimize perceived risk"
  - "Sellers typically receive less than 10% of what the buyer pays - a kidney costs the buyer $100,000-$200,000 while the seller gets $5,000 or less, often nothing"
  - "Post-surgery, sellers are abandoned in cheap hotel rooms with stitches, painkillers, and zero follow-up medical care"
  - "Most sellers report their financial situation did NOT improve long-term - many end up in worse poverty because the surgery left them unable to do physical labor"
  - "Regions where organ selling is prevalent are called Kidney Villages - entire communities where a significant portion of adults carry the same surgical scar"
  - "Sellers are often coerced through forged documents creating false family ties to make the illegal procedure appear as legal altruistic donation"
  - "Many sellers do not seek medical help for post-surgery complications out of fear of arrest, shame, or lack of legal recourse"
  - "Former sellers are sometimes recruited as recruiters themselves - bringing new victims into the network to earn small commissions"
  - "The scar is permanent and visible - a mark that tells everyone in the community what you did, creating lifelong social stigma"

